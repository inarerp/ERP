        </div>
      </div>}
    </div>
  );
}

// ── Broker Detail ──
function BrokerDetail({ brokerId, onBack }) {
  const [broker, setBroker] = useState(null);
  const [deals, setDeals] = useState([]);
  const [payments, setPayments] = useState([]);
  const [payModal, setPayModal] = useState(false);
  const [payForm, setPayForm] = useState({ amount:'', payment_date: new Date().toISOString().slice(0,10), account_id:'', notes:'', _nonce: makeNonce() });
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);

  const load = useCallback(async () => {
    const [{ data: b },{ data: db },{ data: p }] = await Promise.all([
      sb.from('brokers').select('*').eq('id', brokerId).single(),
      sb.from('deal_brokers').select('*, deals(deal_number,name,status,value)').eq('broker_id', brokerId),
      sb.from('payments').select('*').eq('payee_type','broker').eq('payee_id', brokerId).order('payment_date',{ascending:false}),
    ]);
    setBroker(b); setDeals(db||[]); setPayments(p||[]); setLoading(false);
  },[brokerId]);
  useEffect(()=>{ load(); },[load]);

  const savePay = async () => {
    if (saving) return;
    try {
      const amt      = assertPositiveAmount(payForm.amount, 'مبلغ العمولة');
      const remaining = Number(broker.commission_due||0) - Number(broker.commission_paid||0);
      if (amt > remaining + 0.01)
        throw new Error(`المبلغ (${amt.toLocaleString('ar-EG')}) أكبر من العمولة المتبقية (${remaining.toLocaleString('ar-EG')})`);
      setSaving(true);
      await callRpc('record_payment_atomic', {
        p_payee_type:      'broker',
        p_payee_id:        brokerId,
        p_payment_type:    'commission',
        p_amount:          amt,
        p_account_id:      payForm.account_id || null,
        p_deal_id:         null,
        p_notes:           payForm.notes || 'دفع عمولة وسيط',
        p_idempotency_key: makeStableKey('broker_pay', brokerId, payForm._nonce),
      });
      setPayModal(false); setPayForm({ amount:'', payment_date: todayStr(), account_id:'', notes:'', _nonce: makeNonce() });
      await load();
    } catch(err) { showError(err); }
    setSaving(false);
  };

  if (loading) return <Loading/>;
  if (!broker) return null;

  const remaining = Number(broker.commission_due||0) - Number(broker.commission_paid||0);

  return (
    <div className="content">
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <button className="topbar-btn btn-ghost" onClick={onBack}>← رجوع</button>
        <div style={{flex:1}}>
          <div style={{fontSize:18,fontWeight:700,marginBottom:3}}>{broker.name}</div>
          <div style={{fontSize:12,color:'var(--text2)'}}>{broker.phone||''}</div>
        </div>
        {remaining > 0 && <button className="topbar-btn btn-primary" onClick={()=>setPayModal(true)}>+ تسجيل دفعة</button>}
      </div>

      <div className="stats-grid" style={{marginBottom:20}}>
        <StatCard label="العمولات المستحقة" valueClass="amber" value={fmtShort(broker.commission_due)}/>
        <StatCard label="العمولات المدفوعة" valueClass="green" value={fmtShort(broker.commission_paid)}/>
        <div className="stat-card">
          <div className="stat-label">المتبقي</div>
          <div className={`stat-value ${remaining>0?'red':'green'}`}>{fmtShort(remaining)}</div>
        </div>
        <StatCard label="عدد العمليات" valueClass="blue" value={deals.length}/>
      </div>

      <div className="section" style={{marginBottom:16}}>
        <div className="section-header"><span className="section-title">العمليات المرتبطة</span></div>
        {deals.length===0
          ? <Empty icon="📋" title="لا توجد عمليات"/>
          : <table className="table">
              <thead><tr><th>رقم العملية</th><th>الاسم</th><th>قيمة العملية</th><th>نوع العمولة</th><th>العمولة</th><th>المدفوع</th><th>المتبقي</th></tr></thead>
              <tbody>{deals.map(d=>(
                <tr key={d.id}>
                  <td style={{fontFamily:'monospace',fontSize:12,color:'var(--text2)'}}>{d.deals?.deal_number}</td>
                  <td style={{fontWeight:600}}>{d.deals?.name}</td>
                  <td>{fmt(d.deals?.value)}</td>
                  <td><span className="badge badge-gray">{d.commission_type==='percentage'?'نسبة %':'مبلغ ثابت'}</span></td>
                  <td style={{color:'var(--amber)'}}>{fmt(d.commission_due)}</td>
                  <td style={{color:'var(--green)'}}>{fmt(d.commission_paid)}</td>
                  <td style={{color:'var(--red)'}}>{fmt(Number(d.commission_due)-Number(d.commission_paid))}</td>
                </tr>
              ))}</tbody>
            </table>}
      </div>

      <div className="section">
        <div className="section-header"><span className="section-title">كشف حساب المدفوعات</span></div>
        {payments.length===0
          ? <Empty icon="💳" title="لا توجد مدفوعات"/>
          : <table className="table">
              <thead><tr><th>التاريخ</th><th>المبلغ</th><th>ملاحظات</th></tr></thead>
              <tbody>{payments.map(p=>(
                <tr key={p.id}>
                  <td>{p.payment_date}</td>
                  <td style={{color:'var(--green)',fontWeight:600}}>{fmt(p.amount)}</td>
                  <td style={{color:'var(--text2)'}}>{p.notes||'—'}</td>
                </tr>
              ))}</tbody>
            </table>}
      </div>

      {payModal && <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setPayModal(false)}>
        <div className="modal">
          <div className="modal-header"><span className="modal-title">تسجيل دفعة للوسيط</span><button className="modal-close" onClick={()=>setPayModal(false)}>✕</button></div>
          <div className="modal-body">
            <div className="form-group"><label className="form-label">المبلغ (ج.م)</label>
              <input className="form-input" type="number" value={payForm.amount} onChange={e=>setPayForm({...payForm,amount:e.target.value})} placeholder="0"/>
              <div style={{fontSize:11,color:'var(--text3)',marginTop:3}}>المتبقي: {fmt(remaining)}</div>
            </div>
            <div className="form-group"><label className="form-label">تاريخ الدفع</label>
              <input className="form-input" type="date" value={payForm.payment_date} onChange={e=>setPayForm({...payForm,payment_date:e.target.value})}/>
            </div>
            <div className="form-group"><label className="form-label">ملاحظات</label>
              <input className="form-input" value={payForm.notes} onChange={e=>setPayForm({...payForm,notes:e.target.value})} placeholder="اختياري"/>
            </div>
          </div>
          <div className="modal-footer">
            <button className="topbar-btn btn-ghost" onClick={()=>setPayModal(false)}>إلغاء</button>
            <button className="topbar-btn btn-primary" onClick={savePay} disabled={saving}>{saving?'جاري الحفظ...':'حفظ'}</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

// ── Brokers ──
function Brokers({ navigateSub, navigateBack, subId }) {
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(false);
  const [selected, setSelected] = useState(null);
  const [form, setForm] = useState({ name:'', phone:'', email:'', notes:'' });
  const [errors, setErrors] = useState({});
  const [saving, setSaving] = useState(false);
  const [dupMatches, setDupMatches] = useState(null);

  const load = useCallback(async () => {
    const { data: d } = await sb.from('brokers').select('*').order('created_at').limit(500);
    setData(d||[]); setLoading(false);
  },[]);
  useEffect(()=>{ load(); },[load]);

  const checkAndSave = async () => {
    if (!form.name.trim()) { setErrors({name:true}); return; }
    if (saving) return;
    setSaving(true);
    try {
      const matches = await searchExistingParty(form.name, form.phone, form.email);
      const newMatches = matches.filter(m => !m.roles?.includes('broker'));
      if (newMatches.length > 0) { setDupMatches(newMatches); setSaving(false); return; }
      await doCreate();
    } catch(err) { showError(err, 'إضافة وسيط'); setSaving(false); }
  };

  const addRoleToExisting = async (party) => {
    setSaving(true);
    try {
      await callRpc('create_broker_atomic', {
        p_name: party.name, p_phone: form.phone||null,
        p_email: form.email||null, p_notes: form.notes||null,
      });
      setModal(false); setDupMatches(null);
      setForm({ name:'', phone:'', email:'', notes:'' }); await load();
    } catch(err) { showError(err, 'إضافة دور وسيط'); }
    finally { setSaving(false); }
  };

  const doCreate = async () => {
    setSaving(true);
    try {
      await callRpc('create_broker_atomic', {
        p_name: form.name.trim(), p_phone: form.phone||null,
        p_email: form.email||null, p_notes: form.notes||null,
      });
      setModal(false); setDupMatches(null);
      setForm({ name:'', phone:'', email:'', notes:'' }); setErrors({}); await load();
    } catch(err) { showError(err, 'إضافة وسيط'); }
    finally { setSaving(false); }
  };

  if (subId) return <BrokerDetail brokerId={subId} onBack={()=>{ navigateBack('brokers'); load(); }}/>;

  return (
    <div className="content">
      <div className="section">
        <div className="section-header">
          <span className="section-title">الوسطاء</span>
          <button className="topbar-btn btn-primary" onClick={()=>{ setForm({ name:'', phone:'', email:'', notes:'' }); setErrors({}); setModal(true); }}>
            <Icon d={Icons.plus}/> إضافة وسيط
          </button>
        </div>
        <div className="section-body">
          {loading ? <Loading/>
          : data.length===0
          ? <Empty icon="🤝" title="لا يوجد وسطاء"/>
          : <table className="table">
              <thead><tr><th>الاسم</th><th>الهاتف</th><th>العمولات المستحقة</th><th>المدفوع</th><th>المتبقي</th></tr></thead>
              <tbody>{data.map(b=>(
                <tr key={b.id} onClick={()=>navigateSub('brokers',b.id)} style={{cursor:'pointer'}}>
                  <td><div style={{display:'flex',alignItems:'center',gap:10}}><div className="avatar" style={{background:'var(--purple)'}}>{b.name[0]}</div><span style={{fontWeight:600,color:'var(--accent)'}}>{b.name}</span></div></td>
                  <td style={{color:'var(--text2)'}}>{b.phone||'—'}</td>
                  <td style={{color:'var(--amber)'}}>{fmt(b.commission_due)}</td>
                  <td style={{color:'var(--green)'}}>{fmt(b.commission_paid)}</td>
                  <td style={{color:Number(b.commission_due)-Number(b.commission_paid)>0?'var(--red)':'var(--green)'}}>{fmt(Number(b.commission_due)-Number(b.commission_paid))}</td>
                </tr>
              ))}</tbody>
            </table>}
        </div>
      </div>

      {modal && <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(false)}>
        <div className="modal">
          <div className="modal-header"><span className="modal-title">إضافة وسيط جديد</span><button className="modal-close" onClick={()=>setModal(false)}>✕</button></div>
          <div className="modal-body">
            <div className="form-group">
              <label className="form-label">الاسم <span style={{color:'var(--red)'}}>*</span></label>
              <input className="form-input" style={errors.name?{borderColor:'var(--red)'}:{}} value={form.name} onChange={e=>{setForm({...form,name:e.target.value});setErrors({});}} placeholder="اسم الوسيط"/>
              {errors.name && <div style={{fontSize:11,color:'var(--red)',marginTop:3}}>هذا الحقل مطلوب</div>}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div className="form-group"><label className="form-label">الهاتف</label>
                <input className="form-input" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder="01xxxxxxxxx"/>
              </div>
              <div className="form-group"><label className="form-label">البريد الإلكتروني</label>
                <input className="form-input" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="email@example.com"/>
              </div>
            </div>
            <div className="form-group"><label className="form-label">ملاحظات</label>
              <input className="form-input" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="اختياري"/>
            </div>
          </div>
          <div className="modal-footer">
            <button className="topbar-btn btn-ghost" onClick={()=>setModal(false)}>إلغاء</button>
            <button className="topbar-btn btn-primary" onClick={checkAndSave} disabled={saving}>{saving?'جاري الحفظ...':'حفظ'}</button>
          </div>
        </div>
      </div>}
      {dupMatches && <PartyDuplicateModal
        matches={dupMatches} roleName="وسيط"
        onAddRole={addRoleToExisting}
        onCreateNew={()=>{ setDupMatches(null); doCreate(); }}
        onCancel={()=>{ setDupMatches(null); setSaving(false); }}
      />}
    </div>
  );
}

  const [saving, setSaving] = useState(false);

    const { data: d } = await sb.from('accounts').select('*').order('created_at').limit(500);
    setData(d||[]); setLoading(false);
  },[]);

    setSaving(true);
    // P2A-07: balance field removed from form.
    // Accounts are always created with balance=0.
    // Any opening balance must be added via a manual financial movement
    // (record_financial_movement_atomic) so it appears in financial_movements
    // and is included in reconciliation views.
    await sb.from('accounts').insert([{ name:form.name, account_type:form.account_type, balance:0 }]);
    setModal(false); setForm({ name:'', account_type:'cash' });
    await load(); setSaving(false);
  };

  const typeLabel = { cash:'كاش', bank:'بنك', mobile_wallet:'محفظة' };
  const typeColor = { cash:'badge-green', bank:'badge-blue', mobile_wallet:'badge-purple' };

  return (
    <div className="content">
      <div className="section">
        <div className="section-header">
          <span className="section-title">الحسابات المالية</span>
          <button className="topbar-btn btn-primary" onClick={()=>setModal(true)}>
            <Icon d={Icons.plus}/> إضافة حساب
          </button>
        </div>
        <div className="section-body">
          {loading ? <Loading/>
          : data.length === 0
          ? <Empty icon="🏦" title="لا توجد حسابات"/>
          : <table className="table">
              <thead><tr><th>الحساب</th><th>النوع</th><th>الرصيد الحالي</th></tr></thead>
              <tbody>{data.map(a=>(
                <tr key={a.id}>
                  <td style={{fontWeight:600}}>{a.name}</td>
                  <td><span className={`badge ${typeColor[a.account_type]||'badge-gray'}`}>{typeLabel[a.account_type]||a.account_type}</span></td>
                  <td style={{color:'var(--green)',fontWeight:600,fontSize:15}}>{fmt(a.balance)}</td>
                </tr>
              ))}</tbody>
            </table>
          }
        </div>
      </div>
      {modal && <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(false)}>
        <div className="modal">
          <div className="modal-header">
            <span className="modal-title">إضافة حساب مالي</span>
            <button className="modal-close" onClick={()=>setModal(false)}>✕</button>
          </div>
          <div className="modal-body">
            <div className="form-group"><label className="form-label">اسم الحساب</label><input className="form-input" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="مثال: CIB"/></div>
            <div className="form-group"><label className="form-label">النوع</label>
              <select className="form-select" value={form.account_type} onChange={e=>setForm({...form,account_type:e.target.value})}>
                <option value="cash">كاش / خزنة</option>
                <option value="bank">حساب بنكي</option>
                <option value="mobile_wallet">محفظة موبايل</option>
              </select>
            </div>
            {/* P2A-07: Opening balance field removed.
                 Add opening balance after account creation via a manual financial movement.
                 This ensures every balance appears in financial_movements and reconciliation. */}
            <div className="form-group">
              <div style={{fontSize:12,color:'var(--text3)',background:'var(--bg3)',borderRadius:8,padding:'8px 12px',lineHeight:1.6}}>
                💡 الحساب يُنشأ برصيد صفر. لإضافة رصيد افتتاحي، أنشئ حركة مالية يدوية من نوع <strong>إيداع</strong> بعد حفظ الحساب.
              </div>
            </div>
          </div>
          <div className="modal-footer">
            <button className="topbar-btn btn-ghost" onClick={()=>setModal(false)}>إلغاء</button>
            <button className="topbar-btn btn-primary" onClick={save} disabled={saving}>{saving?'جاري الحفظ...':'حفظ'}</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

// ── Clients Page ──
function Clients() {
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(false);
  const [selected, setSelected] = useState(null);
  const [deals, setDeals] = useState([]);
  const [form, setForm] = useState({ name:'', contact_name:'', phone:'', email:'', address:'', notes:'' });
  const [errors, setErrors] = useState({});
  const [saving, setSaving] = useState(false);
  const [dupMatches, setDupMatches] = useState(null);

  const load = useCallback(async () => {
    const { data: d } = await sb.from('clients').select('*').order('created_at').limit(500);
    setData(d||[]); setLoading(false);
  },[]);
  useEffect(()=>{ load(); },[load]);

  const openClient = async (client) => {
    setSelected(client);
    const { data: d } = await sb.from('deals').select('*, entities(name)').eq('client_id', client.id).order('created_at',{ascending:false});
    setDeals(d||[]);
  };

  const checkAndSave = async () => {
    if (!form.name.trim()) { setErrors({name:true}); return; }
    if (saving) return;
    setSaving(true);
    try {
      const matches = await searchExistingParty(form.name, form.phone, form.email);
      const newMatches = matches.filter(m => !m.roles?.includes('client'));
      if (newMatches.length > 0) { setDupMatches(newMatches); setSaving(false); return; }
      await doCreate();
    } catch(err) { showError(err, 'إضافة عميل'); setSaving(false); }
  };

  const addRoleToExisting = async (party) => {
    setSaving(true);
    try {
      await callRpc('create_client_atomic', {
        p_name: party.name, p_contact_name: form.contact_name||null,
        p_phone: form.phone||null, p_email: form.email||null,
        p_address: form.address||null, p_notes: form.notes||null,
      });
      setModal(false); setDupMatches(null);
      setForm({ name:'', contact_name:'', phone:'', email:'', address:'', notes:'' }); await load();
    } catch(err) { showError(err, 'إضافة دور عميل'); }
    finally { setSaving(false); }
  };

  const doCreate = async () => {
    setSaving(true);
    try {
      await callRpc('create_client_atomic', {
        p_name: form.name.trim(), p_contact_name: form.contact_name||null,
        p_phone: form.phone||null, p_email: form.email||null,
        p_address: form.address||null, p_notes: form.notes||null,
      });
      setModal(false); setDupMatches(null);
      setForm({ name:'', contact_name:'', phone:'', email:'', address:'', notes:'' }); setErrors({}); await load();
    } catch(err) { showError(err, 'إضافة عميل'); }
    finally { setSaving(false); }
  };

  if (selected) return (
    <div className="content">
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <button className="topbar-btn btn-ghost" onClick={()=>setSelected(null)}>← رجوع</button>
        <div style={{flex:1}}>
          <div style={{fontSize:18,fontWeight:700,marginBottom:3}}>{selected.name}</div>
          <div style={{fontSize:12,color:'var(--text2)'}}>{selected.phone||''} {selected.email?'· '+selected.email:''} {selected.address?'· '+selected.address:''}</div>
        </div>
      </div>
      <div className="stats-grid" style={{marginBottom:20}}>
        <StatCard label="إجمالي العمليات" valueClass="blue" value={deals.length}/>
        <div className="stat-card">
          <div className="stat-label">إجمالي القيمة</div>
          <div className="stat-value">{fmtShort(deals.reduce((a,d)=>a+Number(d.value||0),0))}</div>
        </div>
        <StatCard label="تم التحصيل الكامل" valueClass="green" value={deals.filter(d=>d.status==='fully_collected'||d.status==='closed').length}/>
      </div>
      <div className="section">
        <div className="section-header"><span className="section-title">العمليات مع {selected.name}</span></div>
        {deals.length===0
          ? <Empty icon="📋" title="لا توجد عمليات"/>
          : <table className="table">
              <thead><tr><th>الرقم</th><th>الاسم</th><th>الكيان</th><th>القيمة</th><th>الحالة</th></tr></thead>
              <tbody>{deals.map(d=>(
                <tr key={d.id}>
                  <td style={{fontFamily:'monospace',fontSize:12,color:'var(--text2)'}}>{d.deal_number}</td>
                  <td style={{fontWeight:600}}>{d.name}</td>
                  <td>{d.entities?.name||'—'}</td>
                  <td>{fmt(d.value)}</td>
                  <td><span className={`badge ${(STATUS_MAP[d.status]||{cls:'badge-gray'}).cls}`}>{(STATUS_MAP[d.status]||{label:'—'}).label}</span></td>
                </tr>
              ))}</tbody>
            </table>}
      </div>
    </div>
  );

  return (
    <div className="content">
      <div className="section">
        <div className="section-header">
          <span className="section-title">العملاء</span>
          <button className="topbar-btn btn-primary" onClick={()=>{ setForm({ name:'', contact_name:'', phone:'', email:'', address:'', notes:'' }); setErrors({}); setModal(true); }}>
            <Icon d={Icons.plus}/> إضافة عميل
          </button>
        </div>
        <div className="section-body">
          {loading ? <Loading/>
          : data.length===0
          ? <Empty icon="🏪" title="لا يوجد عملاء"/>
          : <table className="table">
              <thead><tr><th>الاسم</th><th>جهة الاتصال</th><th>الهاتف</th><th>العنوان</th></tr></thead>
              <tbody>{data.map(c=>(
                <tr key={c.id} onClick={()=>openClient(c)} style={{cursor:'pointer'}}>
                  <td><div style={{display:'flex',alignItems:'center',gap:10}}><div className="avatar" style={{background:'var(--purple)'}}>{c.name[0]}</div><span style={{fontWeight:600,color:'var(--accent)'}}>{c.name}</span></div></td>
                  <td style={{color:'var(--text2)'}}>{c.contact_name||'—'}</td>
                  <td style={{color:'var(--text2)'}}>{c.phone||'—'}</td>
                  <td style={{color:'var(--text2)'}}>{c.address||'—'}</td>
                </tr>
              ))}</tbody>
            </table>}
        </div>
      </div>

      {modal && <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(false)}>
        <div className="modal">
          <div className="modal-header"><span className="modal-title">إضافة عميل جديد</span><button className="modal-close" onClick={()=>setModal(false)}>✕</button></div>
          <div className="modal-body">
            <div className="form-group">
              <label className="form-label">اسم العميل / الجهة <span style={{color:'var(--red)'}}>*</span></label>
              <input className="form-input" style={errors.name?{borderColor:'var(--red)'}:{}} value={form.name} onChange={e=>{setForm({...form,name:e.target.value});setErrors({});}} placeholder="مثال: ريتش بيك"/>
              {errors.name && <div style={{fontSize:11,color:'var(--red)',marginTop:3}}>هذا الحقل مطلوب</div>}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div className="form-group"><label className="form-label">جهة الاتصال</label>
                <input className="form-input" value={form.contact_name} onChange={e=>setForm({...form,contact_name:e.target.value})} placeholder="اسم المسؤول"/>
              </div>
              <div className="form-group"><label className="form-label">الهاتف</label>
                <input className="form-input" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder="01xxxxxxxxx"/>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div className="form-group"><label className="form-label">البريد الإلكتروني</label>
                <input className="form-input" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="email@example.com"/>
              </div>
              <div className="form-group"><label className="form-label">العنوان</label>
                <input className="form-input" value={form.address} onChange={e=>setForm({...form,address:e.target.value})} placeholder="العنوان"/>
              </div>
            </div>
            <div className="form-group"><label className="form-label">ملاحظات</label>
              <input className="form-input" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="اختياري"/>
            </div>
          </div>
          <div className="modal-footer">
            <button className="topbar-btn btn-ghost" onClick={()=>setModal(false)}>إلغاء</button>
            <button className="topbar-btn btn-primary" onClick={checkAndSave} disabled={saving}>{saving?'جاري الحفظ...':'حفظ'}</button>
          </div>
        </div>
      </div>}
      {dupMatches && <PartyDuplicateModal
        matches={dupMatches} roleName="عميل"
        onAddRole={addRoleToExisting}
        onCreateNew={()=>{ setDupMatches(null); doCreate(); }}
        onCancel={()=>{ setDupMatches(null); setSaving(false); }}
      />}
    </div>
  );
}

// ── Financial Movements ──
function FinancialMovements() {
  const [movements, setMovements] = useState([]);
  const [accounts, setAccounts] = useState([]);
  const [entities, setEntities] = useState([]);
  const [deals, setDeals] = useState([]);
  const [investors, setInvestors] = useState([]);
  const [brokers, setBrokers] = useState([]);
  const [categories, setCategories] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(false);
  const [saving, setSaving] = useState(false);
  const [filter, setFilter] = useState({ direction:'all', movement_type:'all', account_id:'all' });

  const emptyForm = {
    direction:'out', amount:'', movement_date: new Date().toISOString().slice(0,10),
    account_id:'', movement_type:'expense', category:'',
    entity_id:'', deal_id:'', investor_id:'', broker_id:'',
    is_deal_expense: false, description:'', notes:''
  };
  const [form, setForm] = useState(emptyForm);
  const [errors, setErrors] = useState({});

  const load = useCallback(async () => {
    const [{ data: mv },{ data: acc },entParties,{ data: d },invParties,brkParties,{ data: cat }] = await Promise.all([
      sb.from('financial_movements').select('*, accounts(name), entities(name), deals(deal_number,name), investors(name), brokers(name)').order('movement_date', { ascending: false }).limit(500),
      sb.from('accounts').select('id,name,account_type,balance'),
      fetchPartiesByRole('entity'),
      sb.from('deals').select('id,deal_number,name').order('created_at',{ascending:false}).limit(500),
      fetchPartiesByRole('investor'),
      fetchPartiesByRole('broker'),
      sb.from('movement_categories').select('*').order('type').limit(200),
    ]);
    setMovements(mv||[]); setAccounts(acc||[]); setEntities(entParties);
    setDeals(d||[]); setInvestors(invParties); setBrokers(brkParties);
    setCategories(cat||[]); setLoading(false);
  },[]);
  useEffect(()=>{ load(); },[load]);

  const validate = () => {
    const e = {};
    if (!form.amount) e.amount = true;
    if (!form.account_id) e.account_id = true;
    if (!form.movement_date) e.movement_date = true;
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const save = async () => {
    if (!validate()) return;
    if (saving) return;
    try {
      const amt = assertPositiveAmount(form.amount, 'المبلغ');
      setSaving(true);
      await callRpc('record_financial_movement_atomic', {
        p_direction:        form.direction,
        p_amount:           amt,
        p_movement_date:    form.movement_date || todayStr(),
        p_account_id:       form.account_id   || null,
        p_movement_type:    form.movement_type,
        p_category:         form.category     || null,
        p_entity_id:        form.entity_id    || null,
        p_deal_id:          form.deal_id      || null,
        p_investor_id:      form.investor_id  || null,
        p_broker_id:        form.broker_id    || null,
        p_is_deal_expense:  form.is_deal_expense || false,
        p_description:      form.description  || null,
        p_notes:            form.notes        || null,
        p_idempotency_key:  makeIdempotencyKey('fm'),
      });
      setModal(false); setForm(emptyForm); setErrors({});
      await load();
    } catch(err) { showError(err); }
    setSaving(false);
  };

  // فلترة
  const filtered = movements.filter(m => {
    if (filter.direction!=='all' && m.direction!==filter.direction) return false;
    if (filter.movement_type!=='all' && m.movement_type!==filter.movement_type) return false;
    if (filter.account_id!=='all' && m.account_id!==filter.account_id) return false;
    return true;
  });

  const totalIn  = filtered.filter(m=>m.direction==='in').reduce((a,m)=>a+Number(m.amount),0);
  const totalOut = filtered.filter(m=>m.direction==='out').reduce((a,m)=>a+Number(m.amount),0);

  const mvTypes = {
    expense:'مصروف', revenue:'إيراد', transfer:'تحويل',
    investor_deposit:'إيداع ممول', investor_return:'إرجاع ممول',
    broker_payment:'دفع وسيط', owner_withdrawal:'سحب مالك'
  };
  const mvTypeColors = {
    expense:'badge-red', revenue:'badge-green', transfer:'badge-blue',
    investor_deposit:'badge-purple', investor_return:'badge-amber',
    broker_payment:'badge-amber', owner_withdrawal:'badge-gray'
  };
  const expCats = categories.filter(c=>c.type==='expense');
  const revCats = categories.filter(c=>c.type==='revenue');
  const currentCats = ['expense','investor_return','broker_payment','owner_withdrawal'].includes(form.movement_type) ? expCats : revCats;

  return (
    <div className="content">
      {/* Stats */}
      <div className="stats-grid" style={{marginBottom:20}}>
        {(accounts||[]).map(a=>(
          <div key={a.id} className="stat-card">
            <div className="stat-label">{a.name}</div>
            <div className={`stat-value ${Number(a.balance)>=0?'green':'red'}`}>{fmtShort(a.balance)}</div>
            <div className="stat-sub">{{cash:'كاش',bank:'بنك',mobile_wallet:'محفظة'}[a.account_type]||a.account_type}</div>
          </div>
        ))}
        <StatCard label="إجمالي الوارد (المعروض)" valueClass="green" value={fmtShort(totalIn)}/>
        <StatCard label="إجمالي الصادر (المعروض)" valueClass="red" value={fmtShort(totalOut)}/>
      </div>

      <div className="section">
        <div className="section-header">
          <span className="section-title">الحركات المالية</span>
          <button className="topbar-btn btn-primary" onClick={()=>{ setForm(emptyForm); setErrors({}); setModal(true); }}>
            <Icon d={Icons.plus}/> حركة جديدة
          </button>
        </div>

        {/* فلاتر */}
        <div style={{padding:'12px 18px',borderBottom:'1px solid var(--border)',display:'flex',gap:10,flexWrap:'wrap'}}>
          <select className="form-select" style={{width:'auto',minWidth:130}} value={filter.direction} onChange={e=>setFilter({...filter,direction:e.target.value})}>
            <option value="all">كل الاتجاهات</option>
            <option value="in">وارد فقط</option>
            <option value="out">صادر فقط</option>
          </select>
          <select className="form-select" style={{width:'auto',minWidth:150}} value={filter.movement_type} onChange={e=>setFilter({...filter,movement_type:e.target.value})}>
            <option value="all">كل الأنواع</option>
            {Object.entries(mvTypes).map(([k,v])=><option key={k} value={k}>{v}</option>)}
          </select>
          <select className="form-select" style={{width:'auto',minWidth:150}} value={filter.account_id} onChange={e=>setFilter({...filter,account_id:e.target.value})}>
            <option value="all">كل الحسابات</option>
            {(accounts||[]).map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
          </select>
        </div>

        <div className="section-body">
          {loading ? <Loading/>
          : filtered.length===0
          ? <Empty icon="💳" title="لا توجد حركات"/>
          : <table className="table">
              <thead><tr>
                <th>التاريخ</th><th>الاتجاه</th><th>النوع</th><th>الفئة</th>
                <th>المبلغ</th><th>الحساب</th><th>مرتبط بـ</th><th>البيان</th><th></th>
              </tr></thead>
              <tbody>{filtered.map(m=>(
                <tr key={m.id}>
                  <td style={{color:'var(--text2)',fontSize:12}}>{m.movement_date}</td>
                  <td>
                    <span className={`badge ${m.direction==='in'?'badge-green':'badge-red'}`}>
                      {m.direction==='in'?'▲ وارد':'▼ صادر'}
                    </span>
                  </td>
                  <td><span className={`badge ${mvTypeColors[m.movement_type]||'badge-gray'}`}>{mvTypes[m.movement_type]||m.movement_type}</span></td>
                  <td style={{color:'var(--text2)',fontSize:12}}>{m.category||'—'}</td>
                  <td style={{fontWeight:700,color:m.direction==='in'?'var(--green)':'var(--red)'}}>{fmt(m.amount)}</td>
                  <td style={{fontSize:12}}>{m.accounts?.name||'—'}</td>
                  <td style={{fontSize:12,color:'var(--text2)'}}>
                    {m.deals?.deal_number ? `📋 ${m.deals.deal_number}` :
                     m.investors?.name ? `👤 ${m.investors.name}` :
                     m.entities?.name ? `🏢 ${m.entities.name}` :
                     m.brokers?.name ? `🤝 ${m.brokers.name}` : '—'}
                  </td>
                  <td style={{color:'var(--text2)',fontSize:12,maxWidth:180}}>{m.description||'—'}</td>
                  <td>
                    {!m.is_reversed && !m.is_reversal &&
                      <button onClick={async()=>{
                        const r = prompt('سبب التصحيح؟');
                        if (!r) return;
                        try {
                          await reverseFinancialMovement(m.id, r);
                          await load();
                        } catch(err) {
                          showError(err, 'عكس الحركة');
                        }
                      }}
                        style={{fontSize:11,padding:'3px 8px',borderRadius:6,background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',color:'var(--red)',cursor:'pointer',fontFamily:'Cairo,sans-serif'}}>
                        عكس ↩
                      </button>}
                    {m.is_reversed && <span style={{fontSize:10,color:'var(--text3)'}}>✓ مُعكوس</span>}
                    {m.is_reversal && <span style={{fontSize:10,color:'var(--amber)'}}>↩ تصحيح</span>}
                  </td>
                </tr>
              ))}</tbody>
            </table>}
        </div>
      </div>

      {/* Modal إضافة حركة */}
      {modal && <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(false)}>
        <div className="modal" style={{maxWidth:600}}>
          <div className="modal-header">
            <span className="modal-title">إضافة حركة مالية</span>
            <button className="modal-close" onClick={()=>setModal(false)}>✕</button>
          </div>
          <div className="modal-body" style={{maxHeight:'72vh',overflowY:'auto'}}>

            {/* وارد / صادر */}
            <div style={{display:'flex',gap:10,marginBottom:16}}>
              {[['in','▲ وارد','var(--green)'],['out','▼ صادر','var(--red)']].map(([val,label,color])=>(
                <button key={val} type="button" onClick={()=>setForm({...form,direction:val})}
                  style={{flex:1,padding:'10px',borderRadius:8,border:'2px solid',cursor:'pointer',fontFamily:'Cairo,sans-serif',fontSize:14,fontWeight:700,
                    background: form.direction===val?'rgba(0,0,0,.1)':'var(--bg3)',
                    borderColor: form.direction===val?color:'var(--border)',
                    color: form.direction===val?color:'var(--text2)',
                  }}>{label}</button>
              ))}
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div className="form-group">
                <label className="form-label">المبلغ (ج.م) <span style={{color:'var(--red)'}}>*</span></label>
                <input className="form-input" type="number" style={errors.amount?{borderColor:'var(--red)'}:{}} value={form.amount} onChange={e=>{setForm({...form,amount:e.target.value});setErrors({...errors,amount:false});}} placeholder="0"/>
                {errors.amount && <div style={{fontSize:11,color:'var(--red)',marginTop:3}}>مطلوب</div>}
              </div>
              <div className="form-group">
                <label className="form-label">التاريخ <span style={{color:'var(--red)'}}>*</span></label>
                <input className="form-input" type="date" value={form.movement_date} onChange={e=>setForm({...form,movement_date:e.target.value})}/>
              </div>
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div className="form-group">
                <label className="form-label">الحساب <span style={{color:'var(--red)'}}>*</span></label>
                <select className="form-select" style={errors.account_id?{borderColor:'var(--red)'}:{}} value={form.account_id} onChange={e=>{setForm({...form,account_id:e.target.value});setErrors({...errors,account_id:false});}}>
                  <option value="">اختر الحساب</option>
                  {(accounts||[]).map(a=><option key={a.id} value={a.id}>{a.name} — {fmt(a.balance)}</option>)}
                </select>
                {errors.account_id && <div style={{fontSize:11,color:'var(--red)',marginTop:3}}>مطلوب</div>}
              </div>
              <div className="form-group">
                <label className="form-label">نوع الحركة</label>
                <select className="form-select" value={form.movement_type} onChange={e=>setForm({...form,movement_type:e.target.value,category:''})}>
                  {Object.entries(mvTypes).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                </select>
              </div>
            </div>

            {/* الفئة */}
            {currentCats.length>0 && <div className="form-group">
              <label className="form-label">الفئة</label>
              <select className="form-select" value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>
                <option value="">اختر الفئة</option>
                {currentCats.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}
              </select>
            </div>}

            {/* الربط الاختياري */}
            <div style={{background:'var(--bg3)',borderRadius:8,padding:'12px 14px',marginBottom:12}}>
              <div style={{fontSize:12,color:'var(--text3)',marginBottom:10}}>ربط بـ (اختياري)</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div className="form-group"><label className="form-label">الكيان</label>
                  <select className="form-select" value={form.entity_id} onChange={e=>setForm({...form,entity_id:e.target.value})}>
                    <option value="">—</option>
                    {(entities||[]).map(e=><option key={e.role_record_id||e.id} value={e.role_record_id||e.id}>{e.name}</option>)}
                  </select>
                </div>
                <div className="form-group"><label className="form-label">العملية</label>
                  <select className="form-select" value={form.deal_id} onChange={e=>setForm({...form,deal_id:e.target.value})}>
                    <option value="">—</option>
                    {deals.map(d=><option key={d.id} value={d.id}>{d.deal_number} — {d.name}</option>)}
                  </select>
                </div>
                <div className="form-group"><label className="form-label">الممول</label>
                  <select className="form-select" value={form.investor_id} onChange={e=>setForm({...form,investor_id:e.target.value})}>
                    <option value="">—</option>
                    {(investors||[]).map(i=><option key={i.role_record_id||i.id} value={i.role_record_id||i.id}>{i.name}</option>)}
                  </select>
                </div>
                <div className="form-group"><label className="form-label">الوسيط</label>
                  <select className="form-select" value={form.broker_id} onChange={e=>setForm({...form,broker_id:e.target.value})}>
                    <option value="">—</option>
                    {brokers.map(b=><option key={b.role_record_id||b.id} value={b.role_record_id||b.id}>{b.name}</option>)}
                  </select>
                </div>
              </div>
              {form.deal_id && <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:13,marginTop:8}}>
                <input type="checkbox" checked={form.is_deal_expense} onChange={e=>setForm({...form,is_deal_expense:e.target.checked})} style={{width:14,height:14}}/>
                هذا مصروف مباشر على العملية
              </label>}
            </div>

            <div className="form-group">
              <label className="form-label">البيان</label>
              <input className="form-input" value={form.description} onChange={e=>setForm({...form,description:e.target.value})} placeholder="وصف مختصر للحركة"/>
            </div>
            <div className="form-group">
              <label className="form-label">ملاحظات</label>
              <input className="form-input" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="اختياري"/>
            </div>

            {/* ملخص */}
            {form.amount && form.account_id && (() => {
              const acc = accounts.find(a=>a.id===form.account_id);
              if (!acc) return null;
              const newBal = form.direction==='in' ? Number(acc.balance)+Number(form.amount) : Number(acc.balance)-Number(form.amount);
              return <div style={{background: newBal<0?'rgba(239,68,68,.08)':'rgba(16,185,129,.08)', border:`1px solid ${newBal<0?'rgba(239,68,68,.2)':'rgba(16,185,129,.2)'}`, borderRadius:8,padding:'10px 14px',fontSize:13,marginTop:4}}>
                <div style={{display:'flex',justifyContent:'space-between'}}>
                  <span>رصيد {acc.name} بعد الحركة</span>
                  <strong style={{color:newBal<0?'var(--red)':'var(--green)'}}>{fmt(newBal)}</strong>
                </div>
              </div>;
            })()}

          </div>
          <div className="modal-footer">
            <button className="topbar-btn btn-ghost" onClick={()=>setModal(false)}>إلغاء</button>
            <button className="topbar-btn btn-primary" onClick={save} disabled={saving}>{saving?'جاري الحفظ...':'حفظ الحركة'}</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

// ── Cheques ──
function Cheques() {
  const [data, setData]       = useState([]);
  const [deals, setDeals]     = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal]     = useState(false);
  const [saving, setSaving]   = useState(false);
  const [filterStatus, setFilterStatus] = useState('all');
  const [filterDir, setFilterDir]       = useState('all');

  const emptyForm = { deal_id:'', cheque_number:'', bank:'', amount:'', due_date:'', direction:'in', status:'received', notes:'' };
  const [form, setForm] = useState(emptyForm);
  const [errors, setErrors] = useState({});

  const load = useCallback(async () => {
    const [{ data: c },{ data: d }] = await Promise.all([
      sb.from('cheques').select('*, deals(deal_number,name)').order('due_date').limit(500),
      sb.from('deals').select('id,deal_number,name').order('created_at',{ascending:false}).limit(500),
    ]);
    setData(c||[]); setDeals(d||[]); setLoading(false);
  },[]);
  useEffect(()=>{ load(); },[load]);

  const validate = () => {
    const e = {};
    if (!form.amount)   e.amount = true;
    if (!form.due_date) e.due_date = true;
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const save = async () => {
    if (!validate()) return;
    setSaving(true);
    await sb.from('cheques').insert([{
      deal_id: form.deal_id||null, cheque_number: form.cheque_number||null,
      bank: form.bank||null, amount: Number(form.amount),
      due_date: form.due_date, direction: form.direction,
      status: 'received', notes: form.notes||null, // P2A-09: always received on creation
    }]);
    setModal(false); setForm(emptyForm); setErrors({});
    await load(); setSaving(false);
  };

  // P2A-09: collection (deposited→collected) now requires account selection
  // and calls process_cheque_collection_atomic which creates a financial_movement.
  // All other transitions are logistical only — direct update + audit is fine.
  const [collectModal, setCollectModal] = useState(false);
  const [collectTarget, setCollectTarget]   = useState(null);   // cheque row
  const [collectAccountId, setCollectAccountId] = useState('');
  const [accounts, setAccounts] = useState([]);

  const loadAccounts = async () => {
    const { data: a } = await sb.from('accounts').select('id,name,account_type').order('name').limit(500);
    setAccounts(a||[]);
  };

  const openCollectModal = async (cheque) => {
    setCollectTarget(cheque);
    await loadAccounts();
    setCollectAccountId('');
    setCollectModal(true);
  };

  const confirmCollect = async () => {
    if (!collectAccountId) { alert('اختر الحساب الذي سيُودَع فيه مبلغ الشيك'); return; }
    setSaving(true);
    try {
      await callRpc('process_cheque_collection_atomic', {
        p_cheque_id:       collectTarget.id,
        p_account_id:      collectAccountId,
        p_collection_date: new Date().toISOString().slice(0,10),
        p_idempotency_key: makeStableKey('cheque_collect', collectTarget.id),
      });
      setCollectModal(false); setCollectTarget(null);
      await load();
    } catch(err) { showError(err, 'تحصيل الشيك'); }
    setSaving(false);
  };

  const updateStatus = async (id, status, cheque) => {
    // logistical transitions only (no money changes hands)
    try {
      await sb.from('cheques').update({ status }).eq('id', id);
      await createAuditLog({
        action: 'cheque_status_changed', tableName:'cheques', recordId: id,
        oldValues:{ status: cheque?.status }, newValues:{ status },
      });
      await load();
    } catch(err) { showError(err); }
  };

  const STATUS = {
    received:  { label:'مستلم',         cls:'badge-blue' },
    deposited: { label:'مودع في البنك', cls:'badge-purple' },
    collected: { label:'تم التحصيل',    cls:'badge-green' },
    returned:  { label:'مرتجع',         cls:'badge-red' },
    cancelled: { label:'ملغي',          cls:'badge-gray' },
  };
  const nextStatus = { received:'deposited', deposited:'collected' };

  const today   = new Date(); today.setHours(0,0,0,0);
  const in7days = new Date(today); in7days.setDate(today.getDate()+7);

  const alertCheques = data.filter(c => {
    if (['collected','cancelled','returned'].includes(c.status)) return false;
    return new Date(c.due_date) <= in7days;
  });

  const filtered = data.filter(c => {
    if (filterStatus!=='all' && c.status!==filterStatus) return false;
    if (filterDir!=='all'    && c.direction!==filterDir) return false;
    return true;
  });

  const totalIn  = data.filter(c=>c.direction==='in'  && !['returned','cancelled'].includes(c.status)).reduce((a,c)=>a+Number(c.amount),0);
  const totalOut = data.filter(c=>c.direction==='out' && !['returned','cancelled'].includes(c.status)).reduce((a,c)=>a+Number(c.amount),0);
  const pending  = data.filter(c=>!['collected','cancelled','returned'].includes(c.status)).reduce((a,c)=>a+Number(c.amount),0);

  const daysUntil = (dateStr) => {
    const due = new Date(dateStr); due.setHours(0,0,0,0);
    const diff = Math.round((due - today) / 86400000);
    if (diff < 0)   return { label:'متأخر '+Math.abs(diff)+' يوم', color:'var(--red)' };
    if (diff === 0) return { label:'اليوم!', color:'var(--red)' };
    if (diff <= 3)  return { label:'بعد '+diff+' أيام', color:'var(--amber)' };
    return { label:'بعد '+diff+' يوم', color:'var(--text2)' };
  };

  return (
    <div className="content">
      {alertCheques.length > 0 && (
        <div style={{background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.25)',borderRadius:12,padding:'12px 16px',marginBottom:16}}>
          <div style={{fontWeight:600,fontSize:13,color:'var(--amber)',marginBottom:8}}>⚠️ شيكات تستحق قريباً ({alertCheques.length})</div>
          {alertCheques.map(c => {
            const d = daysUntil(c.due_date);
            return <div key={c.id} style={{display:'flex',justifyContent:'space-between',fontSize:13,padding:'4px 0',borderBottom:'1px solid rgba(245,158,11,.1)'}}>
              <span>{c.cheque_number?'شيك '+c.cheque_number:'شيك'} — {c.bank||'—'} — {fmt(c.amount)}</span>
              <span style={{color:d.color,fontWeight:600}}>{d.label}</span>
            </div>;
          })}
        </div>
      )}

      <div className="stats-grid" style={{marginBottom:20}}>
        <StatCard label="شيكات وارد" valueClass="green" value={fmtShort(totalIn)} sub="من العملاء"/>
        <StatCard label="شيكات صادر" valueClass="red" value={fmtShort(totalOut)} sub="للممولين/الموردين"/>
        <StatCard label="إجمالي معلق" valueClass="amber" value={fmtShort(pending)} sub="لم يُحصَّل بعد"/>
        <div className="stat-card"><div className="stat-label">تنبيهات</div><div className={`stat-value ${alertCheques.length>0?'red':'green'}`}>{alertCheques.length}</div><div className="stat-sub">خلال 7 أيام</div></div>
      </div>

      <div className="section">
        <div className="section-header">
          <span className="section-title">الشيكات</span>
          <button className="topbar-btn btn-primary" onClick={()=>{ setForm(emptyForm); setErrors({}); setModal(true); }}><Icon d={Icons.plus}/> إضافة شيك</button>
        </div>
        <div style={{padding:'12px 18px',borderBottom:'1px solid var(--border)',display:'flex',gap:10,flexWrap:'wrap'}}>
          <select className="form-select" style={{width:'auto',minWidth:140}} value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
            <option value="all">كل الحالات</option>
            {Object.entries(STATUS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </select>
          <select className="form-select" style={{width:'auto',minWidth:130}} value={filterDir} onChange={e=>setFilterDir(e.target.value)}>
            <option value="all">وارد وصادر</option><option value="in">وارد فقط</option><option value="out">صادر فقط</option>
          </select>
        </div>
        <div className="section-body">
          {loading ? <Loading/>
          : filtered.length===0 ? <Empty icon="🧾" title="لا توجد شيكات"/>
          : <table className="table">
              <thead><tr><th>الاتجاه</th><th>رقم الشيك</th><th>البنك</th><th>المبلغ</th><th>الاستحقاق</th><th>العملية</th><th>الحالة</th><th>إجراء</th></tr></thead>
              <tbody>{filtered.map(c => {
                const d = daysUntil(c.due_date);
                const ns = nextStatus[c.status];
                return <tr key={c.id}>
                  <td><span className={`badge ${c.direction==='in'?'badge-green':'badge-red'}`}>{c.direction==='in'?'▲ وارد':'▼ صادر'}</span></td>
                  <td style={{fontFamily:'monospace',fontSize:12}}>{c.cheque_number||'—'}</td>
                  <td style={{color:'var(--text2)'}}>{c.bank||'—'}</td>
                  <td style={{fontWeight:700,color:c.direction==='in'?'var(--green)':'var(--red)'}}>{fmt(c.amount)}</td>
                  <td><div>{c.due_date}</div>{!['collected','cancelled','returned'].includes(c.status)&&<div style={{fontSize:11,color:d.color,fontWeight:600}}>{d.label}</div>}</td>
                  <td style={{fontSize:12,color:'var(--text2)'}}>{c.deals?.deal_number||'—'}</td>
                  <td><span className={`badge ${STATUS[c.status]?.cls||'badge-gray'}`}>{STATUS[c.status]?.label||c.status}</span></td>
                  <td style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                    {/* deposited→collected: requires account selection + creates financial_movement */}
                    {c.status==='deposited' && (
                      <button onClick={()=>openCollectModal(c)} style={{fontSize:11,padding:'3px 8px',borderRadius:6,background:'rgba(34,197,94,.08)',border:'1px solid rgba(34,197,94,.3)',color:'var(--green)',cursor:'pointer',fontFamily:'Cairo,sans-serif'}}>
                        تحصيل ✓
                      </button>
                    )}
                    {/* received→deposited: logistical only */}
                    {c.status==='received' && (
                      <button onClick={()=>updateStatus(c.id,'deposited',c)} style={{fontSize:11,padding:'3px 8px',borderRadius:6,background:'var(--bg3)',border:'1px solid var(--border)',color:'var(--text2)',cursor:'pointer',fontFamily:'Cairo,sans-serif'}}>
                        إيداع في البنك ←
                      </button>
                    )}
                    {/* received→returned: logistical only */}
                    {c.status==='received'&&<button onClick={()=>updateStatus(c.id,'returned',c)} style={{fontSize:11,padding:'3px 7px',borderRadius:6,background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',color:'var(--red)',cursor:'pointer',fontFamily:'Cairo,sans-serif'}}>مرتجع</button>}
                  </td>
                </tr>;
              })}</tbody>
            </table>}
        </div>
      </div>

      {modal && <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(false)}>
        <div className="modal" style={{maxWidth:540}}>
          <div className="modal-header"><span className="modal-title">إضافة شيك جديد</span><button className="modal-close" onClick={()=>setModal(false)}>✕</button></div>
          <div className="modal-body">
            <div style={{display:'flex',gap:10,marginBottom:16}}>
              {[['in','▲ وارد (من العميل)','var(--green)'],['out','▼ صادر (للمورد)','var(--red)']].map(([val,label,color])=>(
                <button key={val} type="button" onClick={()=>setForm({...form,direction:val})} style={{flex:1,padding:'9px',borderRadius:8,border:'2px solid',cursor:'pointer',fontFamily:'Cairo,sans-serif',fontSize:13,fontWeight:700,background:form.direction===val?'rgba(0,0,0,.08)':'var(--bg3)',borderColor:form.direction===val?color:'var(--border)',color:form.direction===val?color:'var(--text2)'}}>{label}</button>
              ))}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div className="form-group"><label className="form-label">المبلغ (ج.م) <span style={{color:'var(--red)'}}>*</span></label>
                <input className="form-input" type="number" style={errors.amount?{borderColor:'var(--red)'}:{}} value={form.amount} onChange={e=>{setForm({...form,amount:e.target.value});setErrors({...errors,amount:false});}} placeholder="0"/>
              </div>
              <div className="form-group"><label className="form-label">تاريخ الاستحقاق <span style={{color:'var(--red)'}}>*</span></label>
                <input className="form-input" type="date" style={errors.due_date?{borderColor:'var(--red)'}:{}} value={form.due_date} onChange={e=>{setForm({...form,due_date:e.target.value});setErrors({...errors,due_date:false});}}/>
              </div>
              <div className="form-group"><label className="form-label">رقم الشيك</label>
                <input className="form-input" value={form.cheque_number} onChange={e=>setForm({...form,cheque_number:e.target.value})} placeholder="اختياري"/>
              </div>
              <div className="form-group"><label className="form-label">البنك</label>
                <input className="form-input" value={form.bank} onChange={e=>setForm({...form,bank:e.target.value})} placeholder="مثال: CIB"/>
              </div>
              {/* P2A-09: Status locked to 'received' on creation.
                   A new cheque is always 'received' — transitions happen via action buttons. */}
              <div className="form-group"><label className="form-label">الحالة</label>
                <div className="form-input" style={{background:'var(--bg3)',color:'var(--text2)',cursor:'not-allowed'}}>
                  مستلم (الحالة الافتراضية)
                </div>
              </div>
              <div className="form-group"><label className="form-label">مرتبط بعملية</label>
                <select className="form-select" value={form.deal_id} onChange={e=>setForm({...form,deal_id:e.target.value})}>
                  <option value="">— بدون ربط —</option>
                  {deals.map(d=><option key={d.id} value={d.id}>{d.deal_number} — {d.name}</option>)}
                </select>
              </div>
            </div>
            <div className="form-group"><label className="form-label">ملاحظات</label>
              <input className="form-input" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="اختياري"/>
            </div>
            {form.due_date && <div style={{background:'var(--bg3)',borderRadius:8,padding:'8px 14px',fontSize:13}}>
              {(()=>{ const d=daysUntil(form.due_date); return <span style={{color:d.color}}>⏰ {d.label}</span>; })()}
            </div>}
          </div>
          <div className="modal-footer">
            <button className="topbar-btn btn-ghost" onClick={()=>setModal(false)}>إلغاء</button>
            <button className="topbar-btn btn-primary" onClick={save} disabled={saving}>{saving?'جاري الحفظ...':'حفظ الشيك'}</button>
          </div>
        </div>
      </div>}

      {/* P2A-09: Collect modal — picks account then calls process_cheque_collection_atomic */}
      {collectModal && collectTarget && <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setCollectModal(false)}>
        <div className="modal" style={{maxWidth:420}}>
          <div className="modal-header">
            <span className="modal-title">تحصيل الشيك</span>
            <button className="modal-close" onClick={()=>setCollectModal(false)}>✕</button>
          </div>
          <div className="modal-body">
            <div style={{background:'var(--bg3)',borderRadius:8,padding:'10px 14px',marginBottom:14,fontSize:13}}>
              <div style={{fontWeight:700,marginBottom:4}}>
                {collectTarget.cheque_number ? 'شيك رقم ' + collectTarget.cheque_number : 'شيك'} — {collectTarget.bank||'—'}
              </div>
              <div style={{color:'var(--green)',fontWeight:700,fontSize:16}}>{fmt(collectTarget.amount)}</div>
            </div>
            <div className="form-group">
              <label className="form-label">الحساب الذي سيُودَع فيه المبلغ <span style={{color:'var(--red)'}}>*</span></label>
              <select className="form-select" value={collectAccountId} onChange={e=>setCollectAccountId(e.target.value)}>
                <option value="">— اختر الحساب —</option>
                {accounts.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
              </select>
            </div>
            <div style={{fontSize:12,color:'var(--text3)',marginTop:8}}>
              💡 سيُنشأ تلقائياً حركة مالية بمبلغ {fmt(collectTarget.amount)} في الحساب المختار.
            </div>
          </div>
          <div className="modal-footer">
            <button className="topbar-btn btn-ghost" onClick={()=>setCollectModal(false)}>إلغاء</button>
            <button className="topbar-btn btn-primary" onClick={confirmCollect} disabled={saving||!collectAccountId}>
              {saving?'جاري التحصيل...':'✓ تأكيد التحصيل'}
            </button>
          </div>
        </div>
      </div>}

    </div>
  );
}


// ── Reconciliation ──
function Reconciliation() {
  const [result, setResult]   = useState(null);
  const [accounts, setAccounts] = useState([]);
  const [investors, setInvestors] = useState([]);
  const [loading, setLoading] = useState(false);

  const runCheck = async () => {
    setLoading(true);
    try {
      const [{ data: rc }, { data: ac }, { data: ic }] = await Promise.all([
        sb.rpc('run_reconciliation_check'),
        sb.from('v_account_reconciliation').select('*'),
        sb.from('v_investor_reconciliation').select('*'),
      ]);
      setResult(rc);
      setAccounts(ac || []);
      setInvestors(ic || []);
    } catch(err) {
      showError(err);
    }
    setLoading(false);
  };

  return (
    <div className="content">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <div>
          <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>مطابقة الأرصدة</div>
          <div style={{fontSize:12,color:'var(--text2)'}}>تحقق من تطابق الأرصدة المسجلة مع المحسوبة من الحركات</div>
        </div>
        <button className="topbar-btn btn-primary" onClick={runCheck} disabled={loading}>
          {loading ? 'جاري الفحص...' : '▶ تشغيل الفحص'}
        </button>
      </div>

      {result && <div style={{marginBottom:20,background: result.clean ? 'rgba(16,185,129,.08)' : 'rgba(239,68,68,.08)', border:`1px solid ${result.clean ? 'rgba(16,185,129,.3)' : 'rgba(239,68,68,.3)'}`, borderRadius:12,padding:'16px 20px'}}>
        <div style={{fontWeight:700,fontSize:15,color: result.clean ? 'var(--green)' : 'var(--red)',marginBottom:6}}>
          {result.clean ? '✅ النتيجة: الأرصدة متطابقة' : `❌ توجد فروقات — حسابات: ${result.account_discrepancies} | ممولون: ${result.investor_discrepancies}`}
        </div>
        <div style={{fontSize:12,color:'var(--text2)'}}>وقت الفحص: {new Date(result.checked_at).toLocaleString('ar-EG')}</div>
      </div>}

      {/* Account Reconciliation */}
      <div className="section" style={{marginBottom:16}}>
        <div className="section-header"><span className="section-title">مطابقة الحسابات</span></div>
        {accounts.length === 0
          ? <div className="empty"><div className="empty-icon">🏦</div><div className="empty-title">اضغط "تشغيل الفحص" أولاً</div></div>
          : <table className="table">
              <thead><tr><th>الحساب</th><th>الرصيد المسجّل</th><th>الرصيد المحسوب</th><th>الفرق</th><th>الحالة</th></tr></thead>
              <tbody>{accounts.map(a=>(
                <tr key={a.id}>
                  <td style={{fontWeight:600}}>{a.name}</td>
                  <td>{fmt(a.recorded_balance)}</td>
                  <td>{fmt(a.computed_balance)}</td>
                  <td style={{color: Math.abs(a.discrepancy) > 0.01 ? 'var(--red)' : 'var(--green)', fontWeight:600}}>
                    {fmt(a.discrepancy)}
                  </td>
                  <td><span className={`badge ${Math.abs(a.discrepancy) > 0.01 ? 'badge-red' : 'badge-green'}`}>
                    {Math.abs(a.discrepancy) > 0.01 ? '❌ فرق' : '✅ متطابق'}
                  </span></td>
                </tr>
              ))}</tbody>
            </table>}
      </div>

      {/* Investor Reconciliation */}
      <div className="section">
        <div className="section-header"><span className="section-title">مطابقة أرصدة الممولين</span></div>
        {investors.length === 0
          ? <div className="empty"><div className="empty-icon">💰</div><div className="empty-title">اضغط "تشغيل الفحص" أولاً</div></div>
          : <table className="table">
              <thead><tr><th>الممول</th><th>المتاح (مسجّل)</th><th>المتاح (محسوب)</th><th>الفرق</th><th>الربح الصافي</th><th>الحالة</th></tr></thead>
              <tbody>{investors.map(i=>{
                const diff = Number(i.recorded_available||0) - Number(i.computed_available||0);
                return <tr key={i.id}>
                  <td style={{fontWeight:600}}>{i.name}</td>
                  <td>{fmt(i.recorded_available)}</td>
                  <td>{fmt(i.computed_available)}</td>
                  <td style={{color: Math.abs(diff) > 0.01 ? 'var(--red)' : 'var(--green)', fontWeight:600}}>{fmt(diff)}</td>
                  <td style={{color:'var(--amber)'}}>{fmt(i.computed_profit_net)}</td>
                  <td><span className={`badge ${Math.abs(diff) > 0.01 ? 'badge-red' : 'badge-green'}`}>
                    {Math.abs(diff) > 0.01 ? '❌ فرق' : '✅ متطابق'}
                  </span></td>
                </tr>;
              })}</tbody>
            </table>}
      </div>
    </div>
  );
}

// ── Nav config ──
const PAGES = [
  { key:'dashboard',      label:'لوحة التحكم',    icon:Icons.dashboard },
  { key:'deals',          label:'العمليات',        icon:Icons.deals },
  { key:'parties',        label:'الأطراف',         icon:Icons.parties },
  { key:'accounts',       label:'الحسابات',        icon:Icons.accounts },
  { key:'movements',      label:'الحركات المالية', icon:Icons.collection },
  { key:'cheques',        label:'الشيكات',         icon:Icons.cheques },
  { key:'owner',          label:'أرباح المالك',    icon:Icons.reports },
  { key:'reconciliation', label:'مطابقة الأرصدة',  icon:Icons.check },
];
const PAGE_TITLES = {
  dashboard:'لوحة التحكم', deals:'العمليات', parties:'الأطراف',
  accounts:'الحسابات', movements:'الحركات المالية', cheques:'الشيكات',
  owner:'أرباح المالك', reconciliation:'مطابقة الأرصدة',
  entities:'الكيانات', investors:'الممولون', brokers:'الوسطاء', clients:'العملاء',
};
const PAGE_COMPONENTS = {
  dashboard:Dashboard, deals:Deals, parties:Parties,
  entities:Entities, investors:Investors, brokers:Brokers, clients:Clients,
  accounts:Accounts, movements:FinancialMovements, cheques:Cheques,
  owner:OwnerDashboard, reconciliation:Reconciliation,
};

// ── Global Search ──
function GlobalSearch({ navigateSub, navigate, onClose }) {
  const [q, setQ]           = useState('');
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current?.focus(); }, []);

  useEffect(() => {
    if(!q || q.trim().length < 2) { setResults([]); return; }
    const timer = setTimeout(async () => {
      setLoading(true);
      try {
        const term = q.trim().toLowerCase();
        const [
          { data: parties },
          { data: deals },
          { data: cheqs },
        ] = await Promise.all([
          sb.from('v_parties_unified').select('id,name,phone,email,is_investor,is_entity,is_broker,is_client').ilike('name', `%${term}%`).limit(5),
          sb.from('deals').select('id,deal_number,name,status').or(`name.ilike.%${term}%,deal_number.ilike.%${term}%`).limit(5),
          sb.from('cheques').select('id,cheque_number,amount,status').ilike('cheque_number', `%${term}%`).limit(3),
        ]);
        const r = [];
        (parties||[]).forEach(p => r.push({ type:'party', label:p.name, sub:p.phone||p.email||'', id:p.id, roles:[p.is_investor&&'ممول',p.is_entity&&'كيان',p.is_broker&&'وسيط',p.is_client&&'عميل'].filter(Boolean) }));
        (deals||[]).forEach(d   => r.push({ type:'deal',  label:d.deal_number+' — '+d.name, sub:(STATUS_MAP[d.status]||{label:d.status}).label, id:d.id }));
        (cheqs||[]).forEach(c   => r.push({ type:'cheque',label:'شيك: '+(c.cheque_number||c.id), sub:fmt(c.amount), id:c.id }));
        setResults(r);
      } finally { setLoading(false); }
    }, 300);
    return () => clearTimeout(timer);
  }, [q]);

  const handleSelect = (r) => {
    if(r.type==='party')  { navigateSub('parties', r.id); onClose(); }
    if(r.type==='deal')   { navigateSub('deals',   r.id); onClose(); }
    if(r.type==='cheque') { navigate('cheques');          onClose(); }
  };

  const typeColors = { party:'#60a5fa', deal:'#a78bfa', cheque:'#34d399' };
  const typeLabels = { party:'طرف', deal:'عملية', cheque:'شيك' };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.7)',zIndex:500,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'80px 16px 16px'}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:'100%',maxWidth:560,background:'var(--bg2)',borderRadius:14,border:'1px solid var(--border)',overflow:'hidden',boxShadow:'0 20px 60px rgba(0,0,0,.5)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 16px',borderBottom:'1px solid var(--border)'}}>
          <Icon d={Icons.search}/>
          <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)}
            placeholder="بحث في العمليات، الأطراف، الشيكات..."
            style={{flex:1,background:'none',border:'none',outline:'none',color:'var(--text)',fontFamily:'Cairo,sans-serif',fontSize:15}}/>
          {loading && <span style={{fontSize:12,color:'var(--text3)'}}>...</span>}
          <button onClick={onClose} style={{border:'none',background:'none',color:'var(--text3)',cursor:'pointer',padding:4}}>✕</button>
        </div>
        {results.length>0 && <div style={{maxHeight:360,overflowY:'auto'}}>
          {results.map((r,i) => (
            <div key={i} className="search-result-item" onClick={()=>handleSelect(r)}>
              <span className="search-result-type" style={{background:typeColors[r.type]+'22',color:typeColors[r.type]}}>
                {typeLabels[r.type]}
              </span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.label}</div>
                <div style={{fontSize:11,color:'var(--text3)'}}>{r.sub}{r.roles?.length?' · '+r.roles.join(' • '):''}</div>
              </div>
              <Icon d={Icons.arrow_l} size={14}/>
            </div>
          ))}
        </div>}
        {q.length>=2 && !loading && results.length===0 && (
          <div style={{padding:'20px',textAlign:'center',color:'var(--text3)',fontSize:13}}>لا نتائج لـ "{q}"</div>
        )}
        {q.length<2 && (
          <div style={{padding:'16px',color:'var(--text3)',fontSize:12,textAlign:'center'}}>اكتب اسم أو رقم للبحث...</div>
        )}
      </div>
    </div>
  );
}

// ── App ──
function App() {
  const [user,    setUser]    = useState(null);
  const [checking,setChecking]= useState(true);
  const [showSearch,setShowSearch]=useState(false);

  const parseHash = () => {
    const hash = window.location.hash.replace('#','');
    const [page, subId] = hash.split('/');
    const validPage = PAGE_COMPONENTS[page] ? page : 'dashboard';
    return { page: validPage, subId: subId || null };
  };
  const [route, setRoute] = useState(parseHash);
  const [sidebarOpen, setSidebarOpen] = useState(false);

  const page  = route.page;
  const subId = route.subId;

  const navigate = (key) => {
    window.history.pushState(null,'',`#${key}`);
    setRoute({ page:key, subId:null });
    setSidebarOpen(false);
  };
  const navigateSub = (page, id) => {
    window.history.pushState(null,'',`#${page}/${id}`);
    setRoute({ page, subId:id });
  };
  const navigateBack = (page) => {
    window.history.pushState(null,'',`#${page}`);
    setRoute({ page, subId:null });
  };

  useEffect(()=>{
    const onPop = () => setRoute(parseHash());
    window.addEventListener('popstate', onPop);
    return ()=>window.removeEventListener('popstate', onPop);
  },[]);

  // Keyboard shortcut: Ctrl+K / Cmd+K للـ Global Search
  useEffect(()=>{
    const handler = (e)=>{
      if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();setShowSearch(true);}
      if(e.key==='Escape'){setShowSearch(false);setSidebarOpen(false);}
    };
    window.addEventListener('keydown',handler);
    return ()=>window.removeEventListener('keydown',handler);
  },[]);

  useEffect(()=>{
    sb.auth.getSession().then(({data})=>{setUser(data.session?.user||null);setChecking(false);});
    const {data:sub} = sb.auth.onAuthStateChange((_,session)=>setUser(session?.user||null));
    return ()=>sub.subscription.unsubscribe();
  },[]);

  const logout = async () => {
    await sb.auth.signOut(); setUser(null);
    window.history.pushState(null,'','#');
  };

  if(checking) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',color:'var(--text2)',fontFamily:'Cairo,sans-serif'}}><Loading/></div>;
  if(!user)    return <Login onLogin={setUser}/>;

  const PageComp = PAGE_COMPONENTS[page] || Dashboard;
  const routeProps = { navigateSub, navigateBack, navigate, subId };

  const BOTTOM_NAV = [
    {key:'dashboard',label:'الرئيسية',icon:Icons.dashboard},
    {key:'deals',    label:'العمليات',icon:Icons.deals},
    {key:'parties',  label:'الأطراف', icon:Icons.parties},
    {key:'cheques',  label:'الشيكات', icon:Icons.cheques},
    {key:'menu',     label:'المزيد',  icon:Icons.reports},
  ];

  return (
    <div className="layout">
      {sidebarOpen && <div onClick={()=>setSidebarOpen(false)}
        style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:199,touchAction:'none'}}/>}

      {showSearch && <GlobalSearch navigateSub={navigateSub} navigate={navigate} onClose={()=>setShowSearch(false)}/>}

      <aside className={`sidebar ${sidebarOpen?'open':''}`}>
        <div className="sidebar-logo">
          <div className="logo-icon">ت</div>
          <div>
            <div className="logo-text">نظام التوريدات</div>
            <div className="logo-sub">إدارة التمويل والاستثمارات</div>
          </div>
        </div>
        <nav className="sidebar-nav">
          <div className="nav-section">
            <div className="nav-section-title">القوائم الرئيسية</div>
            {PAGES.map(p=>(
              <button key={p.key} className={`nav-item ${page===p.key?'active':''}`} onClick={()=>navigate(p.key)}>
                <Icon d={p.icon}/>{p.label}
                {p.badge&&<span className="nav-badge">{p.badge}</span>}
              </button>
            ))}
          </div>
          {/* Shortcuts للـ legacy views */}
          <div className="nav-section">
            <div className="nav-section-title" style={{marginTop:8}}>اختصارات</div>
            {[{key:'investors',label:'الممولون',icon:Icons.investors},{key:'entities',label:'الكيانات',icon:Icons.entities},{key:'brokers',label:'الوسطاء',icon:Icons.brokers},{key:'clients',label:'العملاء',icon:Icons.clients}].map(p=>(
              <button key={p.key} className={`nav-item ${page===p.key?'active':''}`} onClick={()=>navigate(p.key)} style={{opacity:.75}}>
                <Icon d={p.icon}/>{p.label}
              </button>
            ))}
          </div>
        </nav>
        <div style={{padding:'12px 8px',borderTop:'1px solid var(--border)'}}>
          <button className="nav-item" onClick={logout} style={{width:'100%'}}>
            <Icon d={Icons.logout}/> تسجيل الخروج
          </button>
        </div>
      </aside>

      <main className="main">
        <header className="topbar">
          <button className="hamburger-btn" onClick={()=>setSidebarOpen(o=>!o)}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <span className="topbar-title">{PAGE_TITLES[page]}</span>
          {/* Global Search */}
          <button onClick={()=>setShowSearch(true)}
            style={{display:'flex',alignItems:'center',gap:6,padding:'6px 12px',borderRadius:8,border:'1px solid var(--border)',background:'var(--bg3)',color:'var(--text2)',cursor:'pointer',fontSize:12,fontFamily:'Cairo,sans-serif',flex:1,maxWidth:280}}>
            <Icon d={Icons.search} size={14}/> بحث... <span style={{marginRight:'auto',fontSize:10,opacity:.5}}>Ctrl+K</span>
          </button>
          <span className="user-email" style={{fontSize:12,color:'var(--text3)',flexShrink:0}}>{user.email}</span>
        </header>

        <PageComp {...routeProps}/>

        <nav className="bottom-nav">
          {BOTTOM_NAV.map(item => item.key==='menu'
            ? <button key="menu" className="bottom-nav-item" onClick={()=>setSidebarOpen(o=>!o)}>
                <Icon d={item.icon} size={20}/><span>{item.label}</span>
              </button>
            : <button key={item.key} className={`bottom-nav-item ${page===item.key?'active':''}`} onClick={()=>navigate(item.key)}>
                <Icon d={item.icon} size={20}/><span>{item.label}</span>
              </button>
          )}
        </nav>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
