<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام التوريدات والتمويل</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --bg2: #161b27;
    --bg3: #1e2535;
    --border: #2a3348;
    --text: #e8eaf0;
    --text2: #8892a4;
    --text3: #4a5568;
    --accent: #3d7fff;
    --accent2: #2563eb;
    --green: #10b981;
    --amber: #f59e0b;
    --red: #ef4444;
    --purple: #8b5cf6;
  }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  /* Layout */
  .layout { display: flex; min-height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: 240px; min-height: 100vh;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    position: fixed; right: 0; top: 0;
    z-index: 100;
  }
  .sidebar-logo {
    padding: 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--accent); display: flex;
    align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: white;
  }
  .logo-text { font-size: 15px; font-weight: 700; color: var(--text); }
  .logo-sub { font-size: 11px; color: var(--text2); }

  .sidebar-nav { flex: 1; padding: 12px 8px; overflow-y: auto; }
  .nav-section { margin-bottom: 20px; }
  .nav-section-title {
    font-size: 10px; font-weight: 600; color: var(--text3);
    padding: 0 8px 6px; text-transform: uppercase; letter-spacing: .05em;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: 8px;
    cursor: pointer; font-size: 13px; font-weight: 500;
    color: var(--text2); transition: all .15s; margin-bottom: 2px;
    border: none; background: none; width: 100%; text-align: right;
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: rgba(61,127,255,.12); color: var(--accent); }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .nav-badge {
    margin-right: auto; background: var(--accent);
    color: white; font-size: 10px; padding: 1px 6px;
    border-radius: 10px; font-weight: 600;
  }

  /* Main */
  .main { margin-right: 240px; flex: 1; display: flex; flex-direction: column; }

  /* Topbar */
  .topbar {
    height: 56px; background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 24px; gap: 16px;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-title { font-size: 16px; font-weight: 600; flex: 1; }
  .topbar-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    border: none; font-family: 'Cairo', sans-serif;
    transition: all .15s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); }

  /* Content */
  .content { padding: 24px; flex: 1; }

  /* Stats grid */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
    transition: border-color .15s; cursor: default;
  }
  .stat-card:hover { border-color: var(--accent); }
  .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-value.green { color: var(--green); }
  .stat-value.amber { color: var(--amber); }
  .stat-value.red { color: var(--red); }
  .stat-value.blue { color: var(--accent); }
  .stat-value.purple { color: var(--purple); }
  .stat-sub { font-size: 11px; color: var(--text3); margin-top: 5px; }

  /* Section */
  .section { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
  .section-header {
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .section-title { font-size: 14px; font-weight: 600; }
  .section-body { padding: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* Table */
  .table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .table th {
    text-align: right; padding: 10px 16px;
    background: var(--bg3); color: var(--text2);
    font-weight: 600; font-size: 11px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .table td { padding: 12px 16px; border-bottom: 1px solid var(--border); color: var(--text); white-space: nowrap; }
  .table tr:last-child td { border-bottom: none; }
  .table tr:hover td { background: rgba(255,255,255,.02); }

  /* Badge */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-green { background: rgba(16,185,129,.12); color: var(--green); }
  .badge-amber { background: rgba(245,158,11,.12); color: var(--amber); }
  .badge-red { background: rgba(239,68,68,.12); color: var(--red); }
  .badge-blue { background: rgba(61,127,255,.12); color: var(--accent); }
  .badge-purple { background: rgba(139,92,246,.12); color: var(--purple); }
  .badge-gray { background: rgba(255,255,255,.06); color: var(--text2); }

  /* Login */
  .login-wrap {
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
    background: var(--bg);
  }
  .login-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px; width: 380px;
  }
  .login-logo { text-align: center; margin-bottom: 28px; }
  .login-logo-icon {
    width: 56px; height: 56px; border-radius: 14px;
    background: var(--accent); display: inline-flex;
    align-items: center; justify-content: center;
    font-size: 26px; font-weight: 700; color: white;
    margin-bottom: 12px;
  }
  .login-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .login-sub { font-size: 13px; color: var(--text2); }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%; padding: 10px 12px; border-radius: 8px;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); font-size: 14px; font-family: 'Cairo', sans-serif;
    direction: rtl; transition: border-color .15s; outline: none;
  }
  .form-input:focus { border-color: var(--accent); }
  .btn-full { width: 100%; padding: 11px; font-size: 15px; }
  .error-msg { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.2); color: #fca5a5; padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 20px;
  }
  .modal {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 14px; width: 100%; max-width: 520px;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-size: 15px; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 20px; line-height: 1; padding: 4px; }
  .modal-body { padding: 20px; }
  .modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

  /* Select */
  .form-select {
    width: 100%; padding: 10px 12px; border-radius: 8px;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); font-size: 14px; font-family: 'Cairo', sans-serif;
    direction: rtl; outline: none; cursor: pointer;
  }
  .form-select:focus { border-color: var(--accent); }

  /* Empty */
  .empty { text-align: center; padding: 48px 20px; color: var(--text2); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .empty-sub { font-size: 13px; }

  /* Loading */
  .loading { text-align: center; padding: 40px; color: var(--text2); font-size: 14px; }

  /* Tabs */
  .tabs {
    display: flex; gap: 4px; padding: 14px 18px 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none; /* Firefox */
  }
  .tabs::-webkit-scrollbar { display: none; } /* Chrome/Safari */
  .tab {
    padding: 8px 14px; border-radius: 8px 8px 0 0;
    font-size: 13px; font-weight: 500; cursor: pointer;
    border: none; background: none; color: var(--text2);
    font-family: 'Cairo', sans-serif; border-bottom: 2px solid transparent;
    transition: all .15s; white-space: nowrap; flex-shrink: 0;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(61,127,255,.06); }
  .tab:hover:not(.active) { color: var(--text); background: var(--bg3); }

  /* Avatar */
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--accent); display: inline-flex;
    align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: white; flex-shrink: 0;
  }

  /* Row actions */
  .row-action { background: none; border: none; color: var(--text3); cursor: pointer; padding: 4px 6px; border-radius: 4px; transition: .1s; }
  .row-action:hover { color: var(--accent); background: rgba(61,127,255,.1); }

  /* ── Global Search ── */
  .search-bar {
    position: relative; flex: 1; max-width: 360px;
  }
  .search-bar input {
    width: 100%; padding: 7px 36px 7px 14px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'Cairo',sans-serif;
    font-size: 13px; outline: none;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar .search-icon {
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%); color: var(--text3);
    pointer-events: none;
  }
  .search-results {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 10px; z-index: 300; max-height: 400px; overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }
  .search-result-item {
    padding: 10px 14px; cursor: pointer; display: flex;
    align-items: center; gap: 10px; transition: background .12s;
    border-bottom: 1px solid var(--border);
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: var(--bg3); }
  .search-result-type {
    font-size: 10px; padding: 2px 7px; border-radius: 4px;
    font-weight: 600; flex-shrink: 0;
  }

  /* ── Quick Actions ── */
  .quick-actions { display: flex; gap: 6px; align-items: center; }
  .qa-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 11px; border-radius: 7px; border: none;
    font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: 'Cairo',sans-serif; transition: all .15s; white-space: nowrap;
  }

  /* ── Action Center Dashboard ── */
  .action-center { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .action-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; position: relative; overflow: hidden;
  }
  .action-card-urgent { border-color: rgba(239,68,68,.4); background: rgba(239,68,68,.04); }
  .action-card-warn   { border-color: rgba(245,158,11,.35); background: rgba(245,158,11,.04); }
  .action-card-info   { border-color: rgba(61,127,255,.3); background: rgba(61,127,255,.04); }
  .action-card-ok     { border-color: rgba(16,185,129,.3); background: rgba(16,185,129,.04); }
  .action-card-title  { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
  .action-card-value  { font-size: 24px; font-weight: 700; line-height: 1; }
  .action-card-sub    { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .action-card-items  { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
  .action-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 8px; border-radius: 6px; cursor: pointer; transition: background .12s;
    font-size: 12px;
  }
  .action-item:hover { background: rgba(255,255,255,.05); }
  .priority-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }
  .kpi-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 16px; }
  .kpi-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
  }
  .kpi-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .kpi-value { font-size: 18px; font-weight: 700; }
  .kpi-delta { font-size: 10px; margin-top: 2px; }

  /* ── Party Profile ── */
  .party-header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 20px 24px; display: flex; gap: 16px; align-items: flex-start;
  }
  .party-avatar {
    width: 52px; height: 52px; border-radius: 14px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
  }
  .party-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .party-meta { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
  .party-meta span { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 4px; }
  .role-pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
  }
  .role-investor { background: rgba(61,127,255,.15); color: #60a5fa; }
  .role-entity   { background: rgba(139,92,246,.15); color: #a78bfa; }
  .role-broker   { background: rgba(245,158,11,.15); color: #fbbf24; }
  .role-client   { background: rgba(16,185,129,.15); color: #34d399; }
  .role-other    { background: rgba(100,116,139,.15); color: #94a3b8; }

  .party-sections { padding: 0; }
  .party-section {
    border-bottom: 1px solid var(--border);
  }
  .party-section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; cursor: pointer; transition: background .12s;
    user-select: none;
  }
  .party-section-header:hover { background: rgba(255,255,255,.02); }
  .party-section-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .party-section-body { padding: 0 20px 16px; }

  /* ── Timeline موحدة ── */
  .timeline { padding: 16px 20px; display: flex; flex-direction: column; gap: 0; }
  .timeline-item { display: flex; gap: 12px; position: relative; padding-bottom: 16px; }
  .timeline-item:last-child { padding-bottom: 0; }
  .timeline-item:last-child .timeline-line { display: none; }
  .timeline-dot {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; border: 2px solid var(--border); z-index: 1;
    background: var(--bg2);
  }
  .timeline-line {
    position: absolute; right: 13px; top: 28px; bottom: 0;
    width: 2px; background: var(--border);
  }
  .timeline-content { flex: 1; padding-top: 4px; }
  .timeline-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .timeline-sub { font-size: 11px; color: var(--text3); }
  .timeline-amount { font-size: 12px; font-weight: 600; color: var(--green); }
  .timeline-filters {
    display: flex; gap: 6px; padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto; scrollbar-width: none;
  }
  .timeline-filters::-webkit-scrollbar { display: none; }
  .tl-filter {
    padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
    border: 1px solid var(--border); background: none; color: var(--text3);
    cursor: pointer; white-space: nowrap; font-family: 'Cairo',sans-serif;
    transition: all .12s;
  }
  .tl-filter.active {
    background: var(--accent); border-color: var(--accent); color: white;
  }

  /* ── Breadcrumb ── */
  .breadcrumb {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 24px; background: var(--bg2);
    border-bottom: 1px solid var(--border);
    font-size: 12px; color: var(--text3);
  }
  .breadcrumb-item { cursor: pointer; transition: color .12s; }
  .breadcrumb-item:hover { color: var(--text); }
  .breadcrumb-item.active { color: var(--text); font-weight: 600; cursor: default; }
  .breadcrumb-sep { color: var(--text3); font-size: 10px; }

  /* ── Parties List ── */
  .parties-filter-bar {
    display: flex; gap: 8px; padding: 12px 16px;
    border-bottom: 1px solid var(--border); align-items: center;
    flex-wrap: wrap;
  }
  .role-filter-btn {
    padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border); background: none; color: var(--text3);
    cursor: pointer; font-family: 'Cairo',sans-serif; transition: all .12s; white-space: nowrap;
  }
  .role-filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .party-list-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; cursor: pointer; transition: background .12s;
    border-bottom: 1px solid var(--border);
  }
  .party-list-item:hover { background: var(--bg3); }
  .party-mini-avatar {
    width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: white;
    background: linear-gradient(135deg,var(--accent),var(--accent2));
  }
  @media (max-width: 768px) {
    .sidebar { width: 200px; }
    .main { margin-right: 200px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 600px) {
    /* Sidebar — مخفي تماماً، يفتح بالهامبرغر */
    .sidebar {
      transform: translateX(110%);
      transition: transform .25s ease;
      width: 260px;
      z-index: 200;
    }
    .sidebar.open {
      transform: translateX(0);
      box-shadow: -8px 0 32px rgba(0,0,0,.5);
    }

    /* Main — يأخذ الشاشة كلها */
    .main { margin-right: 0; padding-bottom: 70px; min-width: 0; }

    /* Topbar */
    .topbar { padding: 0 10px; gap: 8px; height: 52px; }
    .topbar-title { font-size: 14px; }
    .user-email { display: none !important; }

    /* Hamburger */
    .hamburger-btn {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
      border: none; background: var(--bg3); color: var(--text2); cursor: pointer;
    }

    /* Content */
    .content { padding: 10px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 10px; }
    .stat-card { padding: 10px; }
    .stat-value { font-size: 16px; }
    .stat-label { font-size: 10px; }
    .stat-sub { font-size: 10px; }

    /* Section body — scroll أفقي للجداول */
    .section-body { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    /* إعادة تعيين white-space على الموبايل — نسمح بالـ wrap في بعض الخلايا */
    .table { min-width: 480px; }
    .table th { white-space: nowrap; padding: 8px 10px; font-size: 11px; }
    .table td { padding: 9px 10px; font-size: 12px; white-space: nowrap; }
    /* الخلايا اللي ممكن تتكسر */
    .table td.wrap { white-space: normal; min-width: 120px; }

    /* Section header */
    .section-header { flex-wrap: wrap; gap: 6px; padding: 10px; }
    .section-title { font-size: 13px; }
    .topbar-btn { padding: 6px 10px; font-size: 12px; gap: 4px; }

    /* Modals — bottom sheet */
    .modal-overlay {
      padding: 0;
      align-items: flex-end;
    }
    .modal {

// ─────────────────────────────────────────────────────────────────────────
// Stable Idempotency Keys  (P2A-02 / P2A-02b)
//
// Three-tier strategy:
//
// Tier 1 — makeStableKey(...segments)
//   For operations that are inherently unique by their content:
//   reversal (movement id), capital release (deal_investor row id),
//   allocation (deal+investor pair), collection, expense, edit_dist.
//   Same inputs → same key always.
//
// Tier 2 — makeNonce()  +  operation_nonce in form state
//   For user-initiated payments where the same amount to the same account
//   on the same day can legitimately occur more than once (deposit, withdraw,
//   profit payment, broker commission, owner withdrawal).
//   A nonce UUID is generated ONCE when the form/modal opens and stored in
//   React state.  Every submit of that same open form reuses the same nonce
//   (retry-safe).  Closing and reopening the form generates a fresh nonce
//   (new operation).  No Date.now(), no randomUUID() at submit time.
//
// Tier 3 — makeIdempotencyKey(prefix)   ← legacy, keep for manual FM only
//   Manual financial movements can legitimately repeat (same amount, same
//   day, different purpose) so a one-time random key is correct there.
// ─────────────────────────────────────────────────────────────────────────
// H-03: Owner payee identifier — used in record_payment_atomic for 'owner' type.
// The RPC does not do a DB lookup on this ID for owner payments (no owners table),
// it is stored in payments.payee_id for reporting purposes only.
// Change this value if your system assigns a different owner ID.
const OWNER_PAYEE_ID = '00000000-0000-0000-0000-000000000001';

const makeStableKey = (...segments) =>
  segments.map(s => String(s ?? '')).join(':');

// Generates a one-time nonce — call this ONCE when opening a form, store
// the result in useState, and pass it to makeStableKey at submit time.
const makeNonce = () =>
  typeof crypto !== 'undefined' && crypto.randomUUID
    ? crypto.randomUUID()
    : Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);

// One-time key — for manual financial movements only (see fm call site).
const makeIdempotencyKey = (prefix) =>
  `${prefix}:${Date.now()}:${makeNonce()}`;

// ─────────────────────────────────────────────────────────────
// P5: Unified error display
// All catch blocks should use showError(err) not alert(err.message)
// so we have one place to change error presentation in future.
// ─────────────────────────────────────────────────────────────
const showError = (err, context = '') => {
  const msg = err?.message || String(err);
  const prefix = context ? `[${context}] ` : '';
  console.error(prefix + msg, err);
  alert(`خطأ: ${msg}`);
};

// دالة مشتركة: تُنفِّذ استعلام Supabase وتُرجع { data, hasError, label } بدل رمي
// الخطأ مباشرة — تُستخدم في شاشات التفاصيل (DealDetail, InvestorDetail) لجلب
// عدة استعلامات بالتوازي مع تتبُّع أيها فشل، دون كسر الشاشة كاملةً عند فشل واحد
const safeQuery = async (query, label) => {
  try {
    const { data, error } = await query;
    if (error) {
      console.error(`[safeQuery] ${label}:`, error.message);
      return { data: [], hasError: true, label };
    }
    return { data: data || [], hasError: false, label };
  } catch(e) {
    console.error(`[safeQuery] ${label} exception:`, e);
    return { data: [], hasError: true, label };
  }
};

const assertPositiveAmount = (value, label = 'amount') => {
  const n = Number(value);
  if (!Number.isFinite(n) || n <= 0) throw new Error(`${label} يجب أن يكون أكبر من صفر`);
  return n;
};

// ─────────────────────────────────────────────────────────────
// Phase 7 — Unified Parties Helpers
// ─────────────────────────────────────────────────────────────

// جلب الأطراف من v_parties_unified مع source_record_id من party_roles
// role: 'investor' | 'entity' | 'client' | 'broker'
const fetchPartiesByRole = async (role) => {
  const { data, error } = await sb
    .from('v_parties_unified')
    .select(`id, name, phone, email, type, roles`)
    .eq(`is_${role}`, true)
    .order('name');
  if (error) throw error;

  // جلب source_record_ids (= الـ ID في الجدول الأصلي) من party_roles
  const partyIds = (data||[]).map(p => p.id);
  if (!partyIds.length) return [];

  const { data: roles } = await sb
    .from('party_roles')
    .select('party_id, source_record_id, source_table')
    .eq('role', role)
    .eq('is_active', true)
    .in('party_id', partyIds);

  const roleMap = {};
  (roles||[]).forEach(r => { roleMap[r.party_id] = r.source_record_id; });

  return (data||[]).map(p => ({
    ...p,
    role_record_id: roleMap[p.id] || null, // investors.id / entities.id / ...
  }));
};

// جلب ممولين مع available_balance
const fetchInvestorParties = async () => {
  const parties = await fetchPartiesByRole('investor');
  if (!parties.length) return [];
  const recordIds = parties.map(p => p.role_record_id).filter(Boolean);
  const { data: balances } = await sb
    .from('investors')
    .select('id, available_balance')
    .in('id', recordIds);
  const balMap = {};
  (balances||[]).forEach(b => { balMap[b.id] = b.available_balance; });
  return parties.map(p => ({
    ...p,
    available_balance: balMap[p.role_record_id] ?? 0,
  }));
};

// البحث عن طرف موجود قبل الإنشاء
const searchExistingParty = async (name, phone, email) => {
  if (!name || name.trim().length < 2) return [];
  const term = name.trim();
  const { data } = await sb.rpc('search_parties', { search_term: term });
  let results = (data || []).map(p => ({
    ...p,
    // Supabase قد يرجع text[] كـ string "{role1,role2}" أو كـ JS Array
    // نوحّد دائماً إلى JS Array
    roles: Array.isArray(p.roles)
      ? p.roles
      : (p.roles ? String(p.roles).replace(/[{}]/g,'').split(',').filter(Boolean) : []),
  }));
  // فلتر إضافي بالهاتف أو الإيميل لو أُدخلا
  if (phone || email) {
    results = results.filter(p =>
      p.name.toLowerCase() === term.toLowerCase() ||
      (phone && p.phone && p.phone.replace(/\s/g,'') === phone.replace(/\s/g,'')) ||
      (email && p.email && p.email.toLowerCase() === email.toLowerCase())
    );
  }
  return results;
};

// دالة مشتركة: تبحث عن طرف مشابه وتُرجع فقط من ليس لديه الدور المطلوب بالفعل
// تُستخدم في Entities/Investors/Brokers/Clients قبل الإنشاء لمنع تكرار الـ Profile
// (كانت هذه المنطق مكرَّرة بنفس الشكل في الشاشات الأربع)
const findDuplicatePartiesForRole = async (name, phone, email, roleKey) => {
  const matches = await searchExistingParty(name, phone, email);
  return matches.filter(m => !m.roles?.includes(roleKey));
};

<script type="text/babel">

const callRpc = async (name, params) => {
  const { data, error } = await sb.rpc(name, params);
  if (error) {
    // Idempotency: duplicate key = operation already completed
    if (error.message && error.message.includes('idempotency')) {
      console.warn('[callRpc] idempotency collision — operation already recorded:', name);
      return { success: true, idempotent: true };
    }
    throw new Error(error.message);
  }
  return data;
};

// ══════════════════════════════════════════════
// Financial Core — Single Source of Truth
// كل حركة مالية في النظام تمر من هنا
// ══════════════════════════════════════════════

// updateAccountBalance: removed — all balance updates handled by RPC

// createFinancialMovement: removed — use record_financial_movement_atomic RPC

// createAuditLog: audit is now written by RPC functions server-side.
// This stub is kept for legacy calls during transition — will be removed after full RPC rollout.
const createAuditLog = async ({ action, tableName, recordId, oldValues, newValues }) => {
  try {
    const { data: authData } = await sb.auth.getUser();
    await sb.from('audit_log').insert([{
      user_id:    authData?.user?.id || null,
      action,
      table_name: tableName,
      record_id:  recordId   || null,
      old_values: oldValues  || null,
      new_values: newValues  || null,
    }]);
  } catch(e) { /* non-blocking */ }
};

// ٥. تخصيص رأس المال لعملية
// يُستدعى لما ممول يتضاف لعملية من DealDetail
// allocateCapital: merged into saveInvestor — uses allocate_investor_to_deal_atomic directly

// ٦. تسجيل تحصيل عميل + حركة مالية + تحديث حساب
// recordCollection: removed — callRpc('record_collection_atomic') used directly

// recordDealExpense: removed — use record_deal_expense_atomic RPC

// recordPayment: removed — use record_payment_atomic RPC

// ══════════════════════════════════════════════
// Priority 1 — Reversing Entries
// لا حذف للحركات — تصحيح محاسبي فقط
// ══════════════════════════════════════════════

const reverseFinancialMovement = async (movementId, reason) => {
  // Full reversal via RPC — atomic: reverses movement + account balance + audit
  return callRpc('reverse_financial_movement_atomic', {
    p_movement_id:     movementId,
    p_reason:          reason || 'تصحيح يدوي',
    p_idempotency_key: makeStableKey('rev', movementId),
  });
};

// ══════════════════════════════════════════════
// Priority 2 — Automatic Capital Release
// تحرير رأس المال تلقائياً عند إلغاء العملية
// عبر cancel_deal_atomic / return_to_study_atomic RPCs (server-side, atomic)
// ══════════════════════════════════════════════

// ══════════════════════════════════════════════
// Priority 3 — Edit Profit Distribution
// تعديل توزيع الأرباح مع Audit
// ══════════════════════════════════════════════

const editProfitDistribution = async (distId, newAmount, currentAmount, investorId, ownerFlag) => {
  const diff = Number(newAmount) - Number(currentAmount);

  // حفظ القيمة الأصلية عند أول تعديل فقط
  const { data: existing } = await sb.from('profit_distributions')
    .select('original_amount, amount').eq('id', distId).single();
  const originalAmount = existing?.original_amount ?? existing?.amount;

  // P2A-01 FIX: Direct update on profit_distributions removed.
  // adjust_profit_distribution_atomic updates BOTH profit_distributions AND
  // investor.profit_due atomically. The old code wrote to profit_distributions
  // first, then called the RPC — if the RPC failed the silent .catch() left
  // the DB permanently inconsistent with no error shown to the user.
  if (diff !== 0) {
    await callRpc('adjust_profit_distribution_atomic', {
      p_dist_id:         distId,
      p_new_amount:      Number(newAmount),
      p_investor_id:     investorId || null,
      p_is_owner:        ownerFlag  || false,
      p_idempotency_key: makeStableKey('edit_dist', distId, String(Number(newAmount))),
    });
  } else {
    // diff === 0: amount unchanged — only metadata needs updating.
    // No financial impact, so a direct write is safe here.
    await sb.from('profit_distributions').update({
      original_amount: originalAmount,
      edited_at:       new Date().toISOString(),
    }).eq('id', distId);
  }

  // audit
  await createAuditLog({
    action: 'profit_distribution_edited', tableName: 'profit_distributions', recordId: distId,
    oldValues: { amount: currentAmount },
    newValues:  { amount: newAmount, original_amount: originalAmount },
  });
};

<script type="text/babel">

// ── Nav config ──
const PAGES = [
  { key:'dashboard',      label:'لوحة التحكم',    icon:Icons.dashboard },
  { key:'deals',          label:'العمليات',        icon:Icons.deals },
  { key:'parties',        label:'الأطراف',         icon:Icons.parties },
  { key:'accounts',       label:'الحسابات',        icon:Icons.accounts },
  { key:'movements',      label:'الحركات المالية', icon:Icons.collection },
  { key:'cheques',        label:'الشيكات',         icon:Icons.cheques },
  { key:'owner',          label:'أرباح المالك',    icon:Icons.reports },
  { key:'reconciliation', label:'مطابقة الأرصدة',  icon:Icons.check },
];
const PAGE_TITLES = {
  dashboard:'لوحة التحكم', deals:'العمليات', parties:'الأطراف',
  accounts:'الحسابات', movements:'الحركات المالية', cheques:'الشيكات',
  owner:'أرباح المالك', reconciliation:'مطابقة الأرصدة',
  entities:'الكيانات', investors:'الممولون', brokers:'الوسطاء', clients:'العملاء',
};
const PAGE_COMPONENTS = {
  dashboard:Dashboard, deals:Deals, parties:Parties,
  entities:Entities, investors:Investors, brokers:Brokers, clients:Clients,
  accounts:Accounts, movements:FinancialMovements, cheques:Cheques,
  owner:OwnerDashboard, reconciliation:Reconciliation,
};

// ── Global Search ──
</script>

<script type="text/babel" src="src/components/GlobalSearch.js"></script>
<script type="text/babel">

// ── App ──
function App() {
  const [user,    setUser]    = useState(null);
  const [checking,setChecking]= useState(true);
  const [showSearch,setShowSearch]=useState(false);

  const parseHash = () => {
    const hash = window.location.hash.replace('#','');
    const [page, subId] = hash.split('/');
    const validPage = PAGE_COMPONENTS[page] ? page : 'dashboard';
    return { page: validPage, subId: subId || null };
  };
  const [route, setRoute] = useState(parseHash);
  const [sidebarOpen, setSidebarOpen] = useState(false);

  const page  = route.page;
  const subId = route.subId;

  const navigate = (key) => {
    window.history.pushState(null,'',`#${key}`);
    setRoute({ page:key, subId:null });
    setSidebarOpen(false);
  };
  const navigateSub = (page, id) => {
    window.history.pushState(null,'',`#${page}/${id}`);
    setRoute({ page, subId:id });
  };
  const navigateBack = (page) => {
    window.history.pushState(null,'',`#${page}`);
    setRoute({ page, subId:null });
  };

  useEffect(()=>{
    const onPop = () => setRoute(parseHash());
    window.addEventListener('popstate', onPop);
    return ()=>window.removeEventListener('popstate', onPop);
  },[]);

  // Keyboard shortcut: Ctrl+K / Cmd+K للـ Global Search
  useEffect(()=>{
    const handler = (e)=>{
      if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();setShowSearch(true);}
      if(e.key==='Escape'){setShowSearch(false);setSidebarOpen(false);}
    };
    window.addEventListener('keydown',handler);
    return ()=>window.removeEventListener('keydown',handler);
  },[]);

  useEffect(()=>{
    sb.auth.getSession().then(({data})=>{setUser(data.session?.user||null);setChecking(false);});
    const {data:sub} = sb.auth.onAuthStateChange((_,session)=>setUser(session?.user||null));
    return ()=>sub.subscription.unsubscribe();
  },[]);

  const logout = async () => {
    await sb.auth.signOut(); setUser(null);
    window.history.pushState(null,'','#');
  };

  if(checking) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',color:'var(--text2)',fontFamily:'Cairo,sans-serif'}}><Loading/></div>;
  if(!user)    return <Login onLogin={setUser}/>;

  const PageComp = PAGE_COMPONENTS[page] || Dashboard;
  const routeProps = { navigateSub, navigateBack, navigate, subId };

  const BOTTOM_NAV = [
    {key:'dashboard',label:'الرئيسية',icon:Icons.dashboard},
    {key:'deals',    label:'العمليات',icon:Icons.deals},
    {key:'parties',  label:'الأطراف', icon:Icons.parties},
    {key:'cheques',  label:'الشيكات', icon:Icons.cheques},
    {key:'menu',     label:'المزيد',  icon:Icons.reports},
  ];

  return (
    <div className="layout">
      {sidebarOpen && <div onClick={()=>setSidebarOpen(false)}
        style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:199,touchAction:'none'}}/>}

      {showSearch && <GlobalSearch navigateSub={navigateSub} navigate={navigate} onClose={()=>setShowSearch(false)}/>}

      <aside className={`sidebar ${sidebarOpen?'open':''}`}>
        <div className="sidebar-logo">
          <div className="logo-icon">ت</div>
          <div>
            <div className="logo-text">نظام التوريدات</div>
            <div className="logo-sub">إدارة التمويل والاستثمارات</div>
          </div>
        </div>
        <nav className="sidebar-nav">
          <div className="nav-section">
            <div className="nav-section-title">القوائم الرئيسية</div>
            {PAGES.map(p=>(
              <button key={p.key} className={`nav-item ${page===p.key?'active':''}`} onClick={()=>navigate(p.key)}>
                <Icon d={p.icon}/>{p.label}
                {p.badge&&<span className="nav-badge">{p.badge}</span>}
              </button>
            ))}
          </div>
          {/* Shortcuts للـ legacy views */}
          <div className="nav-section">
            <div className="nav-section-title" style={{marginTop:8}}>اختصارات</div>
            {[{key:'investors',label:'الممولون',icon:Icons.investors},{key:'entities',label:'الكيانات',icon:Icons.entities},{key:'brokers',label:'الوسطاء',icon:Icons.brokers},{key:'clients',label:'العملاء',icon:Icons.clients}].map(p=>(
              <button key={p.key} className={`nav-item ${page===p.key?'active':''}`} onClick={()=>navigate(p.key)} style={{opacity:.75}}>
                <Icon d={p.icon}/>{p.label}
              </button>
            ))}
          </div>
        </nav>
        <div style={{padding:'12px 8px',borderTop:'1px solid var(--border)'}}>
          <button className="nav-item" onClick={logout} style={{width:'100%'}}>
            <Icon d={Icons.logout}/> تسجيل الخروج
          </button>
        </div>
      </aside>

      <main className="main">
        <header className="topbar">
          <button className="hamburger-btn" onClick={()=>setSidebarOpen(o=>!o)}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <span className="topbar-title">{PAGE_TITLES[page]}</span>
          {/* Global Search */}
          <button onClick={()=>setShowSearch(true)}
            style={{display:'flex',alignItems:'center',gap:6,padding:'6px 12px',borderRadius:8,border:'1px solid var(--border)',background:'var(--bg3)',color:'var(--text2)',cursor:'pointer',fontSize:12,fontFamily:'Cairo,sans-serif',flex:1,maxWidth:280}}>
            <Icon d={Icons.search} size={14}/> بحث... <span style={{marginRight:'auto',fontSize:10,opacity:.5}}>Ctrl+K</span>
          </button>
          <span className="user-email" style={{fontSize:12,color:'var(--text3)',flexShrink:0}}>{user.email}</span>
        </header>

        <PageComp {...routeProps}/>

        <nav className="bottom-nav">
          {BOTTOM_NAV.map(item => item.key==='menu'
            ? <button key="menu" className="bottom-nav-item" onClick={()=>setSidebarOpen(o=>!o)}>
                <Icon d={item.icon} size={20}/><span>{item.label}</span>
              </button>
            : <button key={item.key} className={`bottom-nav-item ${page===item.key?'active':''}`} onClick={()=>navigate(item.key)}>
                <Icon d={item.icon} size={20}/><span>{item.label}</span>
              </button>
          )}
        </nav>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
