<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام التوريدات والتمويل</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --bg2: #161b27;
    --bg3: #1e2535;
    --border: #2a3348;
    --text: #e8eaf0;
    --text2: #8892a4;
    --text3: #4a5568;
    --accent: #3d7fff;
    --accent2: #2563eb;
    --green: #10b981;
    --amber: #f59e0b;
    --red: #ef4444;
    --purple: #8b5cf6;
  }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  /* Layout */
  .layout { display: flex; min-height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: 240px; min-height: 100vh;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    position: fixed; right: 0; top: 0;
    z-index: 100;
  }
  .sidebar-logo {
    padding: 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--accent); display: flex;
    align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: white;
  }
  .logo-text { font-size: 15px; font-weight: 700; color: var(--text); }
  .logo-sub { font-size: 11px; color: var(--text2); }

  .sidebar-nav { flex: 1; padding: 12px 8px; overflow-y: auto; }
  .nav-section { margin-bottom: 20px; }
  .nav-section-title {
    font-size: 10px; font-weight: 600; color: var(--text3);
    padding: 0 8px 6px; text-transform: uppercase; letter-spacing: .05em;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: 8px;
    cursor: pointer; font-size: 13px; font-weight: 500;
    color: var(--text2); transition: all .15s; margin-bottom: 2px;
    border: none; background: none; width: 100%; text-align: right;
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: rgba(61,127,255,.12); color: var(--accent); }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .nav-badge {
    margin-right: auto; background: var(--accent);
    color: white; font-size: 10px; padding: 1px 6px;
    border-radius: 10px; font-weight: 600;
  }

  /* Main */
  .main { margin-right: 240px; flex: 1; display: flex; flex-direction: column; }

  /* Topbar */
  .topbar {
    height: 56px; background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 24px; gap: 16px;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-title { font-size: 16px; font-weight: 600; flex: 1; }
  .topbar-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    border: none; font-family: 'Cairo', sans-serif;
    transition: all .15s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); }

  /* Content */
  .content { padding: 24px; flex: 1; }

  /* Stats grid */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
    transition: border-color .15s; cursor: default;
  }
  .stat-card:hover { border-color: var(--accent); }
  .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-value.green { color: var(--green); }
  .stat-value.amber { color: var(--amber); }
  .stat-value.red { color: var(--red); }
  .stat-value.blue { color: var(--accent); }
  .stat-value.purple { color: var(--purple); }
  .stat-sub { font-size: 11px; color: var(--text3); margin-top: 5px; }

  /* Section */
  .section { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
  .section-header {
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .section-title { font-size: 14px; font-weight: 600; }
  .section-body { padding: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* Table */
  .table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .table th {
    text-align: right; padding: 10px 16px;
    background: var(--bg3); color: var(--text2);
    font-weight: 600; font-size: 11px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .table td { padding: 12px 16px; border-bottom: 1px solid var(--border); color: var(--text); white-space: nowrap; }
  .table tr:last-child td { border-bottom: none; }
  .table tr:hover td { background: rgba(255,255,255,.02); }

  /* Badge */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-green { background: rgba(16,185,129,.12); color: var(--green); }
  .badge-amber { background: rgba(245,158,11,.12); color: var(--amber); }
  .badge-red { background: rgba(239,68,68,.12); color: var(--red); }
  .badge-blue { background: rgba(61,127,255,.12); color: var(--accent); }
  .badge-purple { background: rgba(139,92,246,.12); color: var(--purple); }
  .badge-gray { background: rgba(255,255,255,.06); color: var(--text2); }

  /* Login */
  .login-wrap {
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
    background: var(--bg);
  }
  .login-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px; width: 380px;
  }
  .login-logo { text-align: center; margin-bottom: 28px; }
  .login-logo-icon {
    width: 56px; height: 56px; border-radius: 14px;
    background: var(--accent); display: inline-flex;
    align-items: center; justify-content: center;
    font-size: 26px; font-weight: 700; color: white;
    margin-bottom: 12px;
  }
  .login-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .login-sub { font-size: 13px; color: var(--text2); }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%; padding: 10px 12px; border-radius: 8px;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); font-size: 14px; font-family: 'Cairo', sans-serif;
    direction: rtl; transition: border-color .15s; outline: none;
  }
  .form-input:focus { border-color: var(--accent); }
  .btn-full { width: 100%; padding: 11px; font-size: 15px; }
  .error-msg { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.2); color: #fca5a5; padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 20px;
  }
  .modal {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 14px; width: 100%; max-width: 520px;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-size: 15px; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 20px; line-height: 1; padding: 4px; }
  .modal-body { padding: 20px; }
  .modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

  /* Select */
  .form-select {
    width: 100%; padding: 10px 12px; border-radius: 8px;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); font-size: 14px; font-family: 'Cairo', sans-serif;
    direction: rtl; outline: none; cursor: pointer;
  }
  .form-select:focus { border-color: var(--accent); }

  /* Empty */
  .empty { text-align: center; padding: 48px 20px; color: var(--text2); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .empty-sub { font-size: 13px; }

  /* Loading */
  .loading { text-align: center; padding: 40px; color: var(--text2); font-size: 14px; }

  /* Tabs */
  .tabs {
    display: flex; gap: 4px; padding: 14px 18px 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none; /* Firefox */
  }
  .tabs::-webkit-scrollbar { display: none; } /* Chrome/Safari */
  .tab {
    padding: 8px 14px; border-radius: 8px 8px 0 0;
    font-size: 13px; font-weight: 500; cursor: pointer;
    border: none; background: none; color: var(--text2);
    font-family: 'Cairo', sans-serif; border-bottom: 2px solid transparent;
    transition: all .15s; white-space: nowrap; flex-shrink: 0;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(61,127,255,.06); }
  .tab:hover:not(.active) { color: var(--text); background: var(--bg3); }

  /* Avatar */
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--accent); display: inline-flex;
    align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: white; flex-shrink: 0;
  }

  /* Row actions */
  .row-action { background: none; border: none; color: var(--text3); cursor: pointer; padding: 4px 6px; border-radius: 4px; transition: .1s; }
  .row-action:hover { color: var(--accent); background: rgba(61,127,255,.1); }

  /* ── Global Search ── */
  .search-bar {
    position: relative; flex: 1; max-width: 360px;
  }
  .search-bar input {
    width: 100%; padding: 7px 36px 7px 14px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'Cairo',sans-serif;
    font-size: 13px; outline: none;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar .search-icon {
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%); color: var(--text3);
    pointer-events: none;
  }
  .search-results {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 10px; z-index: 300; max-height: 400px; overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }
  .search-result-item {
    padding: 10px 14px; cursor: pointer; display: flex;
    align-items: center; gap: 10px; transition: background .12s;
    border-bottom: 1px solid var(--border);
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: var(--bg3); }
  .search-result-type {
    font-size: 10px; padding: 2px 7px; border-radius: 4px;
    font-weight: 600; flex-shrink: 0;
  }

  /* ── Quick Actions ── */
  .quick-actions { display: flex; gap: 6px; align-items: center; }
  .qa-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 11px; border-radius: 7px; border: none;
    font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: 'Cairo',sans-serif; transition: all .15s; white-space: nowrap;
  }

  /* ── Action Center Dashboard ── */
  .action-center { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .action-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; position: relative; overflow: hidden;
  }
  .action-card-urgent { border-color: rgba(239,68,68,.4); background: rgba(239,68,68,.04); }
  .action-card-warn   { border-color: rgba(245,158,11,.35); background: rgba(245,158,11,.04); }
  .action-card-info   { border-color: rgba(61,127,255,.3); background: rgba(61,127,255,.04); }
  .action-card-ok     { border-color: rgba(16,185,129,.3); background: rgba(16,185,129,.04); }
  .action-card-title  { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
  .action-card-value  { font-size: 24px; font-weight: 700; line-height: 1; }
  .action-card-sub    { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .action-card-items  { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
  .action-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 8px; border-radius: 6px; cursor: pointer; transition: background .12s;
    font-size: 12px;
  }
  .action-item:hover { background: rgba(255,255,255,.05); }
  .priority-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }
  .kpi-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 16px; }
  .kpi-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
  }
  .kpi-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .kpi-value { font-size: 18px; font-weight: 700; }
  .kpi-delta { font-size: 10px; margin-top: 2px; }

  /* ── Party Profile ── */
  .party-header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 20px 24px; display: flex; gap: 16px; align-items: flex-start;
  }
  .party-avatar {
    width: 52px; height: 52px; border-radius: 14px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
  }
  .party-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .party-meta { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
  .party-meta span { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 4px; }
  .role-pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
  }
  .role-investor { background: rgba(61,127,255,.15); color: #60a5fa; }
  .role-entity   { background: rgba(139,92,246,.15); color: #a78bfa; }
  .role-broker   { background: rgba(245,158,11,.15); color: #fbbf24; }
  .role-client   { background: rgba(16,185,129,.15); color: #34d399; }
  .role-other    { background: rgba(100,116,139,.15); color: #94a3b8; }

  .party-sections { padding: 0; }
  .party-section {
    border-bottom: 1px solid var(--border);
  }
  .party-section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; cursor: pointer; transition: background .12s;
    user-select: none;
  }
  .party-section-header:hover { background: rgba(255,255,255,.02); }
  .party-section-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .party-section-body { padding: 0 20px 16px; }

  /* ── Timeline موحدة ── */
  .timeline { padding: 16px 20px; display: flex; flex-direction: column; gap: 0; }
  .timeline-item { display: flex; gap: 12px; position: relative; padding-bottom: 16px; }
  .timeline-item:last-child { padding-bottom: 0; }
  .timeline-item:last-child .timeline-line { display: none; }
  .timeline-dot {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; border: 2px solid var(--border); z-index: 1;
    background: var(--bg2);
  }
  .timeline-line {
    position: absolute; right: 13px; top: 28px; bottom: 0;
    width: 2px; background: var(--border);
  }
  .timeline-content { flex: 1; padding-top: 4px; }
  .timeline-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .timeline-sub { font-size: 11px; color: var(--text3); }
  .timeline-amount { font-size: 12px; font-weight: 600; color: var(--green); }
  .timeline-filters {
    display: flex; gap: 6px; padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto; scrollbar-width: none;
  }
  .timeline-filters::-webkit-scrollbar { display: none; }
  .tl-filter {
    padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
    border: 1px solid var(--border); background: none; color: var(--text3);
    cursor: pointer; white-space: nowrap; font-family: 'Cairo',sans-serif;
    transition: all .12s;
  }
  .tl-filter.active {
    background: var(--accent); border-color: var(--accent); color: white;
  }

  /* ── Breadcrumb ── */
  .breadcrumb {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 24px; background: var(--bg2);
    border-bottom: 1px solid var(--border);
    font-size: 12px; color: var(--text3);
  }
  .breadcrumb-item { cursor: pointer; transition: color .12s; }
  .breadcrumb-item:hover { color: var(--text); }
  .breadcrumb-item.active { color: var(--text); font-weight: 600; cursor: default; }
  .breadcrumb-sep { color: var(--text3); font-size: 10px; }

  /* ── Parties List ── */
  .parties-filter-bar {
    display: flex; gap: 8px; padding: 12px 16px;
    border-bottom: 1px solid var(--border); align-items: center;
    flex-wrap: wrap;
  }
  .role-filter-btn {
    padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border); background: none; color: var(--text3);
    cursor: pointer; font-family: 'Cairo',sans-serif; transition: all .12s; white-space: nowrap;
  }
  .role-filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .party-list-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; cursor: pointer; transition: background .12s;
    border-bottom: 1px solid var(--border);
  }
  .party-list-item:hover { background: var(--bg3); }
  .party-mini-avatar {
    width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: white;
    background: linear-gradient(135deg,var(--accent),var(--accent2));
  }
  @media (max-width: 768px) {
    .sidebar { width: 200px; }
    .main { margin-right: 200px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 600px) {
    /* Sidebar — مخفي تماماً، يفتح بالهامبرغر */
    .sidebar {
      transform: translateX(110%);
      transition: transform .25s ease;
      width: 260px;
      z-index: 200;
    }
    .sidebar.open {
      transform: translateX(0);
      box-shadow: -8px 0 32px rgba(0,0,0,.5);
    }

    /* Main — يأخذ الشاشة كلها */
    .main { margin-right: 0; padding-bottom: 70px; min-width: 0; }

    /* Topbar */
    .topbar { padding: 0 10px; gap: 8px; height: 52px; }
    .topbar-title { font-size: 14px; }
    .user-email { display: none !important; }

    /* Hamburger */
    .hamburger-btn {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
      border: none; background: var(--bg3); color: var(--text2); cursor: pointer;
    }

    /* Content */
    .content { padding: 10px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 10px; }
    .stat-card { padding: 10px; }
    .stat-value { font-size: 16px; }
    .stat-label { font-size: 10px; }
    .stat-sub { font-size: 10px; }

    /* Section body — scroll أفقي للجداول */
    .section-body { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    /* إعادة تعيين white-space على الموبايل — نسمح بالـ wrap في بعض الخلايا */
    .table { min-width: 480px; }
    .table th { white-space: nowrap; padding: 8px 10px; font-size: 11px; }
    .table td { padding: 9px 10px; font-size: 12px; white-space: nowrap; }
    /* الخلايا اللي ممكن تتكسر */
    .table td.wrap { white-space: normal; min-width: 120px; }

    /* Section header */
    .section-header { flex-wrap: wrap; gap: 6px; padding: 10px; }
    .section-title { font-size: 13px; }
    .topbar-btn { padding: 6px 10px; font-size: 12px; gap: 4px; }

    /* Modals — bottom sheet */
    .modal-overlay {
      padding: 0;
      align-items: flex-end;
    }
    .modal {

// ─────────────────────────────────────────────────────────────────────────
// Stable Idempotency Keys  (P2A-02 / P2A-02b)
//
// Three-tier strategy:
//
// Tier 1 — makeStableKey(...segments)
//   For operations that are inherently unique by their content:
//   reversal (movement id), capital release (deal_investor row id),
//   allocation (deal+investor pair), collection, expense, edit_dist.
//   Same inputs → same key always.
//
// Tier 2 — makeNonce()  +  operation_nonce in form state
//   For user-initiated payments where the same amount to the same account
//   on the same day can legitimately occur more than once (deposit, withdraw,
//   profit payment, broker commission, owner withdrawal).
//   A nonce UUID is generated ONCE when the form/modal opens and stored in
//   React state.  Every submit of that same open form reuses the same nonce
//   (retry-safe).  Closing and reopening the form generates a fresh nonce
//   (new operation).  No Date.now(), no randomUUID() at submit time.
//
// Tier 3 — makeIdempotencyKey(prefix)   ← legacy, keep for manual FM only
//   Manual financial movements can legitimately repeat (same amount, same
//   day, different purpose) so a one-time random key is correct there.
// ─────────────────────────────────────────────────────────────────────────
// H-03: Owner payee identifier — used in record_payment_atomic for 'owner' type.
// The RPC does not do a DB lookup on this ID for owner payments (no owners table),
// it is stored in payments.payee_id for reporting purposes only.
// Change this value if your system assigns a different owner ID.
const OWNER_PAYEE_ID = '00000000-0000-0000-0000-000000000001';

const makeStableKey = (...segments) =>
  segments.map(s => String(s ?? '')).join(':');

// Generates a one-time nonce — call this ONCE when opening a form, store
// the result in useState, and pass it to makeStableKey at submit time.
const makeNonce = () =>
  typeof crypto !== 'undefined' && crypto.randomUUID
    ? crypto.randomUUID()
    : Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);

// One-time key — for manual financial movements only (see fm call site).
const makeIdempotencyKey = (prefix) =>
  `${prefix}:${Date.now()}:${makeNonce()}`;

// ─────────────────────────────────────────────────────────────
// P5: Unified error display
// All catch blocks should use showError(err) not alert(err.message)
// so we have one place to change error presentation in future.
// ─────────────────────────────────────────────────────────────
const showError = (err, context = '') => {
  const msg = err?.message || String(err);
  const prefix = context ? `[${context}] ` : '';
  console.error(prefix + msg, err);
  alert(`خطأ: ${msg}`);
};

// جلب الأطراف من v_parties_unified مع source_record_id من party_roles
// role: 'investor' | 'entity' | 'client' | 'broker'
const fetchPartiesByRole = async (role) => {
  const { data, error } = await sb
    .from('v_parties_unified')
    .select(`id, name, phone, email, type, roles`)
    .eq(`is_${role}`, true)
    .order('name');
  if (error) throw error;

  // جلب source_record_ids (= الـ ID في الجدول الأصلي) من party_roles
  const partyIds = (data||[]).map(p => p.id);
  if (!partyIds.length) return [];

  const { data: roles } = await sb
    .from('party_roles')
    .select('party_id, source_record_id, source_table')
    .eq('role', role)
    .eq('is_active', true)
    .in('party_id', partyIds);

  const roleMap = {};
  (roles||[]).forEach(r => { roleMap[r.party_id] = r.source_record_id; });

  return (data||[]).map(p => ({
    ...p,
    role_record_id: roleMap[p.id] || null, // investors.id / entities.id / ...
  }));
};

// جلب ممولين مع available_balance
const fetchInvestorParties = async () => {
  const parties = await fetchPartiesByRole('investor');
  if (!parties.length) return [];
  const recordIds = parties.map(p => p.role_record_id).filter(Boolean);
  const { data: balances } = await sb
    .from('investors')
    .select('id, available_balance')
    .in('id', recordIds);
  const balMap = {};
  (balances||[]).forEach(b => { balMap[b.id] = b.available_balance; });
  return parties.map(p => ({
    ...p,
    available_balance: balMap[p.role_record_id] ?? 0,
  }));
};

const callRpc = async (name, params) => {
  const { data, error } = await sb.rpc(name, params);
  if (error) {
    // Idempotency: duplicate key = operation already completed
    if (error.message && error.message.includes('idempotency')) {
      console.warn('[callRpc] idempotency collision — operation already recorded:', name);
      return { success: true, idempotent: true };
    }
    throw new Error(error.message);
  }
  return data;
};

      user_id:    authData?.user?.id || null,
      action,
      table_name: tableName,
      record_id:  recordId   || null,
      old_values: oldValues  || null,
      new_values: newValues  || null,
    }]);
  } catch(e) { /* non-blocking */ }
};

// Priority 1 — Reversing Entries

const reverseFinancialMovement = async (movementId, reason) => {
  // Full reversal via RPC — atomic: reverses movement + account balance + audit
  return callRpc('reverse_financial_movement_atomic', {
    p_movement_id:     movementId,
    p_reason:          reason || 'تصحيح يدوي',
    p_idempotency_key: makeStableKey('rev', movementId),
  });
};

// ══════════════════════════════════════════════
// Priority 2 — Automatic Capital Release
// تحرير رأس المال تلقائياً عند إلغاء العملية
// ══════════════════════════════════════════════

const releaseAllInvestorCapital = async (dealId, dealNumber, reason) => {
  // CR-02 FIX: Changed from Promise.all (parallel) to sequential for...of loop.
  // Parallel calls each do SELECT FOR UPDATE on investors — if the same investor
  // appears in two concurrent release operations a deadlock is guaranteed.
  // Sequential execution eliminates the deadlock risk entirely.
  const { data: dealInvestors } = await sb.from('deal_investors')
    .select('*, investors(id,name,available_balance,working_balance,reserved_balance)')
    .eq('deal_id', dealId)
    .eq('capital_released', false);

  if (!dealInvestors || dealInvestors.length === 0) return;

  for (const di of dealInvestors) {
    const released = Number(di.amount) - Number(di.principal_returned || 0);
    if (released <= 0 || di.capital_released) continue;
    await callRpc('return_investor_capital', {
      p_investor_id:      di.investor_id,
      p_deal_investor_id: di.id,
      p_deal_id:          dealId,
      p_deal_number:      dealNumber || '',
      p_amount:           released,
      p_notes:            reason || 'إلغاء/إرجاع العملية',
      p_idempotency_key:  makeStableKey('release', di.id),
    });
  }
};

// ══════════════════════════════════════════════
// Priority 3 — Edit Profit Distribution
// تعديل توزيع الأرباح مع Audit
// ══════════════════════════════════════════════

const editProfitDistribution = async (distId, newAmount, currentAmount, investorId, ownerFlag) => {
  const diff = Number(newAmount) - Number(currentAmount);

  // حفظ القيمة الأصلية عند أول تعديل فقط
  const { data: existing } = await sb.from('profit_distributions')
    .select('original_amount, amount').eq('id', distId).single();
  const originalAmount = existing?.original_amount ?? existing?.amount;

  // P2A-01 FIX: Direct update on profit_distributions removed.
  // adjust_profit_distribution_atomic updates BOTH profit_distributions AND
  // investor.profit_due atomically. The old code wrote to profit_distributions
  // first, then called the RPC — if the RPC failed the silent .catch() left
  // the DB permanently inconsistent with no error shown to the user.
  if (diff !== 0) {
    await callRpc('adjust_profit_distribution_atomic', {
      p_dist_id:         distId,
      p_new_amount:      Number(newAmount),
      p_investor_id:     investorId || null,
      p_is_owner:        ownerFlag  || false,
      p_idempotency_key: makeStableKey('edit_dist', distId, String(Number(newAmount))),
    });
  } else {
    // diff === 0: amount unchanged — only metadata needs updating.
    // No financial impact, so a direct write is safe here.
    await sb.from('profit_distributions').update({
      original_amount: originalAmount,
      edited_at:       new Date().toISOString(),
    }).eq('id', distId);
  }

  // audit
  await createAuditLog({
    action: 'profit_distribution_edited', tableName: 'profit_distributions', recordId: distId,
    oldValues: { amount: currentAmount },
    newValues:  { amount: newAmount, original_amount: originalAmount },
  });
};

      id:'di'+di.id, date:di.created_at||di.deals?.created_at, role:'investor',
      icon:'📋', title:`تخصيص في عملية: ${di.deals?.deal_number||''}`,
      sub: di.deals?.name||'', amount: di.amount, dir:'out',
    }));
    entDeals.forEach(d=>items.push({
      id:'ed'+d.id, date:d.created_at, role:'entity',
      icon:'🏢', title:`عملية: ${d.deal_number} — ${d.name}`,
      sub: (STATUS_MAP[d.status]||{label:d.status}).label, amount:d.value, dir:'in',
    }));
    brkDeals.forEach(d=>items.push({
      id:'bd'+d.id, date:d.created_at||d.deals?.created_at, role:'broker',
      icon:'🤝', title:`وساطة: ${d.deals?.deal_number||''}`,
      sub: d.deals?.name||'', amount:d.commission_due, dir:'in',
    }));
    cliDeals.forEach(d=>items.push({
      id:'cd'+d.id, date:d.created_at, role:'client',
      icon:'🛒', title:`توريد: ${d.deal_number} — ${d.name}`,
      sub: (STATUS_MAP[d.status]||{label:d.status}).label, amount:d.value, dir:'out',
    }));
    items.sort((a,b)=>new Date(b.date)-new Date(a.date));
    if(tlFilter==='all') return items;
    return items.filter(x=>x.role===tlFilter||x.role===undefined);
  };

  const saveEdit = async () => {
    setSaving(true);
    try {
      await sb.from('parties').update({
        name: editForm.name.trim(), phone: editForm.phone||null,
        email: editForm.email||null, address: editForm.address||null, notes: editForm.notes||null,
      }).eq('id',partyId);
      // مزامنة الاسم في الجداول الأصلية
      const invRole = roles.find(x=>x.role==='investor');
      const entRole = roles.find(x=>x.role==='entity');
      const brkRole = roles.find(x=>x.role==='broker');
      const cliRole = roles.find(x=>x.role==='client');
      await Promise.all([
        invRole && sb.from('investors').update({name:editForm.name.trim()}).eq('id',invRole.source_record_id),
        entRole && sb.from('entities').update({name:editForm.name.trim()}).eq('id',entRole.source_record_id),
        brkRole && sb.from('brokers').update({name:editForm.name.trim()}).eq('id',brkRole.source_record_id),
        cliRole && sb.from('clients').update({name:editForm.name.trim()}).eq('id',cliRole.source_record_id),
      ].filter(Boolean));
      setParty(p=>({...p,...editForm}));
      setEditModal(false);
    } catch(err){ showError(err,'تعديل بيانات الطرف'); }
    finally{ setSaving(false); }
  };

  const toggleSection = k => setSections(s=>({...s,[k]:!s[k]}));

  const roleColors = {investor:'role-investor',entity:'role-entity',broker:'role-broker',client:'role-client'};
  const roleLabels = {investor:'ممول',entity:'كيان',broker:'وسيط',client:'عميل'};

  if(loading) return <Loading/>;
  if(!party)  return <div style={{padding:24,color:'var(--red)'}}>الطرف غير موجود</div>;

  const tl = buildTimeline();
  const initials = (party.name||'؟').trim().slice(0,2);

  return (
    <div>
      {/* Breadcrumb */}
      <div className="breadcrumb">
        <span className="breadcrumb-item" onClick={onBack}>الأطراف</span>
        <span className="breadcrumb-sep">›</span>
        <span className="breadcrumb-item active">{party.name}</span>
      </div>

      {/* Party Header */}
      <div className="party-header">
        <div className="party-avatar">{initials}</div>
        <div style={{flex:1,minWidth:0}}>
          <div className="party-name">{party.name}</div>
          <div className="party-meta">
            {party.phone && <span>📞 {party.phone}</span>}
            {party.email && <span>✉️ {party.email}</span>}
            {party.address && <span>📍 {party.address}</span>}
            <span style={{color:'var(--text3)'}}>
              {party.type==='person'?'👤 شخص طبيعي':'🏢 شركة'}
            </span>
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {roles.map(r=>(
              <span key={r.id} className={`role-pill ${roleColors[r.role]||'role-other'}`}>
                {roleLabels[r.role]||r.role}
              </span>
            ))}
          </div>
        </div>
        <button className="topbar-btn" style={{background:'var(--bg3)',color:'var(--text)',flexShrink:0}} onClick={()=>setEditModal(true)}>
          <Icon d={Icons.edit}/> تعديل
        </button>
      </div>

      {/* Summary Cards */}
      {(inv||entity||broker||client) && (
        <div style={{padding:'16px 20px',display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:10,borderBottom:'1px solid var(--border)'}}>
          {inv && <>
            <div className="stat-card"><div className="stat-label">رصيد متاح</div><div className="stat-value green">{fmt(inv.available_balance)}</div></div>
            <div className="stat-card"><div className="stat-label">رصيد عامل</div><div className="stat-value blue">{fmt(inv.working_balance)}</div></div>
            <div className="stat-card"><div className="stat-label">أرباح مستحقة</div><div className="stat-value amber">{fmt(Number(inv.profit_due||0)-Number(inv.profit_paid||0))}</div><div className="stat-sub">مدفوع: {fmt(inv.profit_paid)}</div></div>
            {invDeals.length>0 && <div className="stat-card"><div className="stat-label">عمليات كممول</div><div className="stat-value">{invDeals.length}</div><div className="stat-sub">إجمالي: {fmt(invDeals.reduce((a,x)=>a+Number(x.amount||0),0))}</div></div>}
          </>}
          {entity && <>
            <div className="stat-card"><div className="stat-label">عمليات كيان</div><div className="stat-value">{entDeals.length}</div></div>
            <div className="stat-card"><div className="stat-label">إجمالي قيمة العمليات</div><div className="stat-value">{fmtShort(entDeals.reduce((a,x)=>a+Number(x.value||0),0))}</div></div>
          </>}
          {broker && <>
            <div className="stat-card"><div className="stat-label">عمولات مستحقة</div><div className="stat-value amber">{fmt(Number(broker.commission_due||0)-Number(broker.commission_paid||0))}</div></div>
            <div className="stat-card"><div className="stat-label">عمليات كوسيط</div><div className="stat-value">{brkDeals.length}</div></div>
          </>}
          {client && <>
            <div className="stat-card"><div className="stat-label">توريدات كعميل</div><div className="stat-value">{cliDeals.length}</div></div>
            <div className="stat-card"><div className="stat-label">إجمالي قيمة التوريدات</div><div className="stat-value">{fmtShort(cliDeals.reduce((a,x)=>a+Number(x.value||0),0))}</div></div>
          </>}
        </div>
      )}

      <div className="party-sections">

        {/* Section: العمليات */}
        {(invDeals.length>0||entDeals.length>0||brkDeals.length>0||cliDeals.length>0) && (
          <div className="party-section">
            <div className="party-section-header" onClick={()=>toggleSection('deals')}>
              <div className="party-section-title"><Icon d={Icons.deals}/> العمليات المرتبطة</div>
              <span style={{fontSize:12,color:'var(--text3)'}}>{sections.deals?'▲':'▼'}</span>
            </div>
            {sections.deals && <div className="party-section-body">
              {inv && invDeals.length>0 && <div style={{marginBottom:12}}>
                <div style={{fontSize:12,fontWeight:600,color:'var(--text3)',marginBottom:6}}>كـ ممول</div>
                {invDeals.map(di=>(
                  <div key={di.id} className="action-item" onClick={()=>di.deals&&navigateSub&&navigateSub('deals',di.deals.id)}>
                    <span style={{fontWeight:600,fontSize:13}}>{di.deals?.deal_number} — {di.deals?.name}</span>
                    <span style={{color:'var(--green)',fontSize:12}}>{fmt(di.amount)}</span>
                  </div>
                ))}
              </div>}
              {entity && entDeals.length>0 && <div style={{marginBottom:12}}>
                <div style={{fontSize:12,fontWeight:600,color:'var(--text3)',marginBottom:6}}>كـ كيان منفذ</div>
                {entDeals.map(d=>(
                  <div key={d.id} className="action-item" onClick={()=>navigateSub&&navigateSub('deals',d.id)}>
                    <span style={{fontWeight:600,fontSize:13}}>{d.deal_number} — {d.name}</span>
                    <span className={`badge ${(STATUS_MAP[d.status]||{cls:'badge-gray'}).cls}`}>{(STATUS_MAP[d.status]||{label:d.status}).label}</span>
                  </div>
                ))}
              </div>}
              {broker && brkDeals.length>0 && <div style={{marginBottom:12}}>
                <div style={{fontSize:12,fontWeight:600,color:'var(--text3)',marginBottom:6}}>كـ وسيط</div>
                {brkDeals.map(d=>(
                  <div key={d.id} className="action-item" onClick={()=>d.deals&&navigateSub&&navigateSub('deals',d.deals.id)}>
                    <span style={{fontWeight:600,fontSize:13}}>{d.deals?.deal_number} — {d.deals?.name}</span>
                    <span style={{color:'var(--amber)',fontSize:12}}>{fmt(d.commission_due)}</span>
                  </div>
                ))}
              </div>}
              {client && cliDeals.length>0 && <div>
                <div style={{fontSize:12,fontWeight:600,color:'var(--text3)',marginBottom:6}}>كـ عميل</div>
                {cliDeals.map(d=>(
                  <div key={d.id} className="action-item" onClick={()=>navigateSub&&navigateSub('deals',d.id)}>
                    <span style={{fontWeight:600,fontSize:13}}>{d.deal_number} — {d.name}</span>
                    <span style={{color:'var(--green)',fontSize:12}}>{fmt(d.value)}</span>
                  </div>
                ))}
              </div>}
            </div>}
          </div>
        )}

        {/* Section: Timeline */}
        <div className="party-section">
          <div className="party-section-header" onClick={()=>toggleSection('timeline')}>
            <div className="party-section-title"><Icon d={Icons.clock}/> السجل الكامل</div>
            <span style={{fontSize:12,color:'var(--text3)'}}>{sections.timeline?'▲':'▼'}</span>
          </div>
          {sections.timeline && <>
            <div className="timeline-filters">
              {['all','investor','entity','broker','client'].map(f=>(
                <button key={f} className={`tl-filter ${tlFilter===f?'active':''}`} onClick={()=>setTlFilter(f)}>
                  {{all:'الكل',investor:'كـ ممول',entity:'كـ كيان',broker:'كـ وسيط',client:'كـ عميل'}[f]}
                </button>
              ))}
            </div>
            {tl.length===0
              ? <Empty icon="📋" title="لا سجلات بعد"/>
              : <div className="timeline">
                  {tl.map((item,i)=>(
                    <div key={item.id} className="timeline-item">
                      <div className="timeline-line"/>
                      <div className="timeline-dot" style={{
                        background:{investor:'rgba(61,127,255,.15)',entity:'rgba(139,92,246,.15)',broker:'rgba(245,158,11,.15)',client:'rgba(16,185,129,.15)'}[item.role]||'var(--bg3)',
                      }}>{item.icon}</div>
                      <div className="timeline-content">
                        <div className="timeline-title">{item.title}</div>
                        <div className="timeline-sub">{item.sub} · {item.date?new Date(item.date).toLocaleDateString('ar-EG'):''}</div>
                        {item.amount>0 && <div className="timeline-amount" style={{color:item.dir==='in'?'var(--green)':'var(--amber)'}}>
                          {item.dir==='in'?'+':'-'}{fmt(item.amount)}
                        </div>}
                      </div>
                    </div>
                  ))}
                </div>}
          </>}
        </div>

      </div>

      {/* Edit Modal */}
      {editModal && <Modal title="تعديل بيانات الطرف" onClose={()=>setEditModal(false)} onSave={saveEdit} saving={saving}>
        <Field label="الاسم" required>
          <Input value={editForm.name} onChange={e=>setEditForm({...editForm,name:e.target.value})}/>
        </Field>
        <Field label="الهاتف">
          <Input value={editForm.phone} onChange={e=>setEditForm({...editForm,phone:e.target.value})} placeholder="اختياري"/>
        </Field>
        <Field label="البريد الإلكتروني">
          <Input value={editForm.email} onChange={e=>setEditForm({...editForm,email:e.target.value})} placeholder="اختياري"/>
        </Field>
        <Field label="العنوان">
          <Input value={editForm.address} onChange={e=>setEditForm({...editForm,address:e.target.value})} placeholder="اختياري"/>
        </Field>
        <Field label="ملاحظات" hint="تُحدَّث بيانات الاتصال في جميع الأدوار تلقائياً">
          <textarea className="form-input" rows={3} value={editForm.notes} onChange={e=>setEditForm({...editForm,notes:e.target.value})} style={{resize:'vertical'}}/>
        </Field>
      </Modal>}
    </div>
  );
}

// ── Parties (الشاشة الموحدة) ──
function Parties({ navigateSub, navigateBack, subId }) {
  const [parties, setParties] = useState([]);
  const [loading, setLoading] = useState(true);
  const [roleFilter, setRoleFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [dupMatches, setDupMatches] = useState(null);
  const [addModal, setAddModal] = useState(false);
  const [addRoles, setAddRoles] = useState([]);
  const [addForm, setAddForm] = useState({name:'',type:'company',phone:'',email:'',address:'',notes:'',funding_capacity:''});
  const [saving, setSaving] = useState(false);

  const load = useCallback(async () => {
    const {data} = await sb.from('v_parties_unified').select('*').order('name');
    setParties(data||[]); setLoading(false);
  },[]);
  useEffect(()=>{ load(); },[load]);

  if(subId) return <PartyProfile partyId={subId} onBack={()=>navigateBack('parties')} navigateSub={navigateSub}/>;

  const filtered = parties.filter(p=>{
    const matchRole = roleFilter==='all'
      || (roleFilter==='investor'&&p.is_investor)
      || (roleFilter==='entity'&&p.is_entity)
      || (roleFilter==='broker'&&p.is_broker)
      || (roleFilter==='client'&&p.is_client);
    const s = search.toLowerCase();
    const matchSearch = !search
      || (p.name||'').toLowerCase().includes(s)
      || (p.phone||'').includes(s)
      || (p.email||'').toLowerCase().includes(s);
    return matchRole && matchSearch;
  });

  const roleColors = {investor:'role-investor',entity:'role-entity',broker:'role-broker',client:'role-client'};
  const roleLabels = {investor:'ممول',entity:'كيان',broker:'وسيط',client:'عميل'};

  const checkAndAdd = async () => {
    if(!addForm.name.trim()) return;
    if(addRoles.length===0) { showError(new Error('اختر دوراً واحداً على الأقل'),'إضافة'); return; }
    setSaving(true);
    try {
      const matches = await searchExistingParty(addForm.name, addForm.phone, addForm.email);
      if(matches.length>0){ setDupMatches(matches); setSaving(false); return; }
      await doCreate();
    } catch(err){ showError(err,'إضافة طرف'); setSaving(false); }
  };

  const doCreate = async () => {
    setSaving(true);
    try {
      for(const role of addRoles){
        if(role==='investor') await callRpc('create_investor_atomic',{p_name:addForm.name.trim(),p_phone:addForm.phone||null,p_email:addForm.email||null,p_funding_capacity:Number(addForm.funding_capacity)||0,p_notes:addForm.notes||null});
        if(role==='entity')   await callRpc('create_entity_atomic',{p_name:addForm.name.trim(),p_type:addForm.type,p_notes:addForm.notes||null});
        if(role==='broker')   await callRpc('create_broker_atomic',{p_name:addForm.name.trim(),p_phone:addForm.phone||null,p_email:addForm.email||null,p_notes:addForm.notes||null});
        if(role==='client')   await callRpc('create_client_atomic',{p_name:addForm.name.trim(),p_contact_name:null,p_phone:addForm.phone||null,p_email:addForm.email||null,p_address:addForm.address||null,p_notes:addForm.notes||null});
      }
      setAddModal(false); setDupMatches(null);
      setAddForm({name:'',type:'company',phone:'',email:'',address:'',notes:'',funding_capacity:''});
      setAddRoles([]);
      await load();
    } catch(err){ showError(err,'إضافة طرف'); }
    finally{ setSaving(false); }
  };

  const addRoleToExisting = async (party) => {
    setSaving(true);
    try {
      for(const role of addRoles){
        if(role==='investor') await callRpc('create_investor_atomic',{p_name:party.name,p_phone:addForm.phone||null,p_email:addForm.email||null,p_funding_capacity:Number(addForm.funding_capacity)||0,p_notes:null});
        if(role==='entity')   await callRpc('create_entity_atomic',{p_name:party.name,p_type:addForm.type,p_notes:null});
        if(role==='broker')   await callRpc('create_broker_atomic',{p_name:party.name,p_phone:addForm.phone||null,p_email:addForm.email||null,p_notes:null});
        if(role==='client')   await callRpc('create_client_atomic',{p_name:party.name,p_contact_name:null,p_phone:addForm.phone||null,p_email:addForm.email||null,p_address:addForm.address||null,p_notes:null});
      }
      setAddModal(false); setDupMatches(null); setAddRoles([]);
      await load();
    } catch(err){ showError(err,'إضافة دور'); }
    finally{ setSaving(false); }
  };

  const toggleRole = r => setAddRoles(prev=>prev.includes(r)?prev.filter(x=>x!==r):[...prev,r]);

  return (
    <div className="content">
      <div className="section">
        <div className="section-header">
          <span className="section-title">الأطراف — {filtered.length} طرف</span>
          <button className="topbar-btn btn-primary" onClick={()=>setAddModal(true)}>
            <Icon d={Icons.plus}/> إضافة طرف
          </button>
        </div>

        {/* فلاتر الأدوار + بحث */}
        <div className="parties-filter-bar">
          {['all','investor','entity','broker','client'].map(r=>(
            <button key={r} className={`role-filter-btn ${roleFilter===r?'active':''}`} onClick={()=>setRoleFilter(r)}>
              {{all:'الكل',investor:'الممولون',entity:'الكيانات',broker:'الوسطاء',client:'العملاء'}[r]}
            </button>
          ))}
          <div style={{flex:1}}/>
          <input className="form-input" style={{maxWidth:200,padding:'6px 12px',fontSize:12}}
            placeholder="بحث بالاسم أو التليفون..."
            value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>

        <div className="section-body">
          {loading ? <Loading/> : filtered.length===0
            ? <Empty icon="👤" title="لا توجد أطراف" sub={search?'لا نتائج للبحث':'أضف طرفاً جديداً للبدء'}/>
            : filtered.map(p=>(
              <div key={p.id} className="party-list-item" onClick={()=>navigateSub('parties',p.id)}>
                <div className="party-mini-avatar">{(p.name||'؟').slice(0,2)}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:14,marginBottom:3}}>{p.name}</div>
                  <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                    {p.is_investor&&<span className="role-pill role-investor">ممول</span>}
                    {p.is_entity  &&<span className="role-pill role-entity">كيان</span>}
                    {p.is_broker  &&<span className="role-pill role-broker">وسيط</span>}
                    {p.is_client  &&<span className="role-pill role-client">عميل</span>}
                  </div>
                </div>
                <div style={{textAlign:'left',flexShrink:0}}>
                  {p.phone&&<div style={{fontSize:12,color:'var(--text2)'}}>{p.phone}</div>}
                  {p.email&&<div style={{fontSize:11,color:'var(--text3)'}}>{p.email}</div>}
                </div>
              </div>
            ))}
        </div>
      </div>

      {/* Add Party Modal */}
      {addModal && <Modal title="إضافة طرف جديد" onClose={()=>{setAddModal(false);setAddRoles([]);}} onSave={checkAndAdd} saving={saving} saveLabel="إضافة">
        <Field label="الاسم" required>
          <Input value={addForm.name} onChange={e=>setAddForm({...addForm,name:e.target.value})} placeholder="اسم الشخص أو الشركة"/>
        </Field>
        <Field label="الأدوار" required hint="يمكن اختيار أكثر من دور">
          <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:4}}>
            {['investor','entity','broker','client'].map(r=>(
              <button key={r} type="button"
                onClick={()=>toggleRole(r)}
                style={{padding:'6px 14px',borderRadius:20,border:'1px solid',fontSize:13,cursor:'pointer',
                  fontFamily:'Cairo,sans-serif',transition:'all .15s',
                  background:addRoles.includes(r)?'var(--accent)':'var(--bg3)',
                  borderColor:addRoles.includes(r)?'var(--accent)':'var(--border)',
                  color:addRoles.includes(r)?'white':'var(--text2)',
                }}>
                {addRoles.includes(r)?'✓ ':''}{roleLabels[r]}
              </button>
            ))}
          </div>
        </Field>
        {addRoles.includes('entity')&&<Field label="نوع الكيان">
          <Select value={addForm.type} onChange={e=>setAddForm({...addForm,type:e.target.value})}
            options={[{value:'company',label:'شركة'},{value:'individual',label:'فرد'}]}/>
        </Field>}
        {addRoles.includes('investor')&&<Field label="طاقة التمويل">
          <Input type="number" value={addForm.funding_capacity} onChange={e=>setAddForm({...addForm,funding_capacity:e.target.value})} placeholder="0"/>
        </Field>}
        <Field label="الهاتف"><Input value={addForm.phone} onChange={e=>setAddForm({...addForm,phone:e.target.value})} placeholder="اختياري"/></Field>
        <Field label="البريد الإلكتروني"><Input value={addForm.email} onChange={e=>setAddForm({...addForm,email:e.target.value})} placeholder="اختياري"/></Field>
        <Field label="العنوان"><Input value={addForm.address} onChange={e=>setAddForm({...addForm,address:e.target.value})} placeholder="اختياري"/></Field>
      </Modal>}

      {dupMatches && <PartyDuplicateModal
        matches={dupMatches} roleName={addRoles.map(r=>roleLabels[r]).join(' + ')}
        onAddRole={addRoleToExisting}
        onCreateNew={()=>{ setDupMatches(null); doCreate(); }}
        onCancel={()=>{ setDupMatches(null); setSaving(false); }}
      />}
    </div>
  );
}

// ── Entity Detail ──
function EntityDetail({ entityId, onBack }) {
  const [entity, setEntity] = useState(null);
  const [deals, setDeals] = useState([]);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    const [{ data: e },{ data: d }] = await Promise.all([
      sb.from('entities').select('*').eq('id', entityId).single(),
      sb.from('deals').select('*, clients(name)').eq('entity_id', entityId).order('created_at',{ascending:false}),
    ]);
    setEntity(e); setDeals(d||[]); setLoading(false);
  },[entityId]);
  useEffect(()=>{ load(); },[load]);

  if (loading) return <Loading/>;
  if (!entity) return null;

  const totalValue = deals.reduce((a,d)=>a+Number(d.value||0),0);
  const totalProfit = deals.reduce((a,d)=>a+Number(d.actual_profit||d.expected_profit||0),0);
  const openDeals = deals.filter(d=>!['closed','cancelled','fully_collected'].includes(d.status));
  const taxDue = deals.filter(d=>d.tax_applicable && d.tax_status!=='paid').reduce((a,d)=>a+Number(d.tax_expected||0),0);

  return (
    <div className="content">
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <button className="topbar-btn btn-ghost" onClick={onBack}>← رجوع</button>
        <div style={{flex:1}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:3}}>
            <div className="avatar" style={{width:40,height:40,fontSize:18}}>{entity.name[0]}</div>
            <div>
              <div style={{fontSize:18,fontWeight:700}}>{entity.name}</div>
              <span className="badge badge-blue" style={{fontSize:11}}>{entity.type==='company'?'شركة':'فرد'}</span>
            </div>
          </div>
        </div>
      </div>

      <div className="stats-grid" style={{marginBottom:20}}>
        <div className="stat-card"><div className="stat-label">إجمالي العمليات</div><div className="stat-value blue">{deals.length}</div><div className="stat-sub">مفتوح: {openDeals.length}</div></div>
        <div className="stat-card">
          <div className="stat-label">إجمالي قيمة العمليات</div>
          <div className="stat-value">{fmtShort(totalValue)}</div>
        </div>
        <StatCard label="الأرباح" valueClass="green" value={fmtShort(totalProfit)}/>
        <StatCard label="الضرائب المستحقة" valueClass="amber" value={fmtShort(taxDue)} sub="على عمليات هذا الكيان فقط"/>
      </div>

      <div className="section">
        <div className="section-header"><span className="section-title">عمليات {entity.name}</span></div>
        {deals.length===0
          ? <Empty icon="📋" title="لا توجد عمليات"/>
          : <table className="table">
              <thead><tr><th>الرقم</th><th>الاسم</th><th>العميل</th><th>القيمة</th><th>الضريبة</th><th>الحالة</th></tr></thead>
              <tbody>{deals.map(d=>(
                <tr key={d.id}>
                  <td style={{fontFamily:'monospace',fontSize:12,color:'var(--text2)'}}>{d.deal_number}</td>
                  <td style={{fontWeight:600}}>{d.name}</td>
                  <td>{d.clients?.name||'—'}</td>
                  <td>{fmt(d.value)}</td>
                  <td>{d.tax_applicable ? <span className="badge badge-amber">ضريبي — {fmt(d.tax_expected)}</span> : <span className="badge badge-gray">غير ضريبي</span>}</td>
                  <td><span className={`badge ${(STATUS_MAP[d.status]||{cls:'badge-gray'}).cls}`}>{(STATUS_MAP[d.status]||{label:'—'}).label}</span></td>
                </tr>
              ))}</tbody>
            </table>}
      </div>
    </div>
  );
}

// ── Entities ──
function Entities({ navigateSub, navigateBack, subId }) {
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(false);
  const [selected, setSelected] = useState(null);
  const [form, setForm] = useState({ name:'', type:'company', notes:'' });
  const [errors, setErrors] = useState({});
  const [saving, setSaving] = useState(false);
  const [dupMatches, setDupMatches] = useState(null); // نافذة التكرار

  const load = useCallback(async () => {
    const { data: d } = await sb.from('entities').select('*').order('created_at').limit(500);
    setData(d||[]); setLoading(false);
  }, []);
  useEffect(()=>{ load(); },[load]);

  const openModal = () => {
    setForm({ name:'', type:'company', notes:'' });
    setErrors({}); setDupMatches(null); setModal(true);
  };

  // خطوة 1: التحقق من وجود طرف مشابه قبل الحفظ
  const checkAndSave = async () => {
    if (!form.name.trim()) { setErrors({name:true}); return; }
    if (saving) return;
    setSaving(true);
    try {
      const matches = await searchExistingParty(form.name, null, null);
      // استبعاد من لديه role=entity بالفعل
      const newMatches = matches.filter(m => !m.roles?.includes('entity'));
      if (newMatches.length > 0) {
        setDupMatches(newMatches);
        setSaving(false);
        return;
      }
      await doCreate();
    } catch(err) {
      showError(err, 'إضافة كيان');
      setSaving(false);
    }
  };

  // إضافة دور entity لـ party موجود
  const addRoleToExisting = async (party) => {
    setSaving(true);
    try {
      // نُنشئ entity جديد ويربطه الـ RPC بنفس الـ party تلقائياً (upsert_party_role)
      await callRpc('create_entity_atomic', {
        p_name:  party.name,
        p_type:  form.type || 'company',
        p_notes: form.notes || null,
      });
      setModal(false); setDupMatches(null);
      setForm({ name:'', type:'company', notes:'' });
      await load();
    } catch(err) { showError(err, 'إضافة دور كيان'); }
    finally { setSaving(false); }
  };

  // إنشاء جديد بشكل طبيعي
  const doCreate = async () => {
    setSaving(true);
    try {
      await callRpc('create_entity_atomic', {
        p_name:  form.name.trim(),
        p_type:  form.type  || 'company',
        p_notes: form.notes || null,
      });
      setModal(false); setDupMatches(null);
      setForm({ name:'', type:'company', notes:'' }); setErrors({});
      await load();
    } catch(err) { showError(err, 'إضافة كيان'); }
    finally { setSaving(false); }
  };

  if (subId) return <EntityDetail entityId={subId} onBack={()=>{ navigateBack('entities'); load(); }}/>;

  return (
    <div className="content">
      <div className="section">
        <div className="section-header">
          <span className="section-title">الكيانات المالية</span>
          <button className="topbar-btn btn-primary" onClick={()=>{ setForm({ name:'', type:'company', notes:'' }); setErrors({}); setModal(true); }}>
            <Icon d={Icons.plus}/> إضافة كيان
          </button>
        </div>
        <div className="section-body">
          {loading ? <Loading/>
          : data.length === 0
          ? <Empty icon="🏢" title="لا توجد كيانات"/>
          : <table className="table">
              <thead><tr><th>الاسم</th><th>النوع</th><th>ملاحظات</th><th>تاريخ الإضافة</th></tr></thead>
              <tbody>{data.map(e=>(
                <tr key={e.id} onClick={()=>navigateSub('entities',e.id)} style={{cursor:'pointer'}}>
                  <td><div style={{display:'flex',alignItems:'center',gap:10}}><div className="avatar">{e.name[0]}</div><span style={{fontWeight:600,color:'var(--accent)'}}>{e.name}</span></div></td>
                  <td><span className="badge badge-blue">{e.type==='company'?'شركة':'فرد'}</span></td>
                  <td style={{color:'var(--text2)'}}>{e.notes||'—'}</td>
                  <td style={{color:'var(--text2)'}}>{new Date(e.created_at).toLocaleDateString('ar-EG')}</td>
                </tr>
              ))}</tbody>
            </table>}
        </div>
      </div>

      {modal && <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(false)}>
        <div className="modal">
          <div className="modal-header"><span className="modal-title">إضافة كيان جديد</span><button className="modal-close" onClick={()=>setModal(false)}>✕</button></div>
          <div className="modal-body">
            <div className="form-group">
              <label className="form-label">اسم الكيان <span style={{color:'var(--red)'}}>*</span></label>
              <input className="form-input" style={errors.name?{borderColor:'var(--red)'}:{}} value={form.name} onChange={e=>{setForm({...form,name:e.target.value});setErrors({});}} placeholder="مثال: شركة إينار"/>
              {errors.name && <div style={{fontSize:11,color:'var(--red)',marginTop:3}}>هذا الحقل مطلوب</div>}
            </div>
            <div className="form-group"><label className="form-label">النوع</label>
              <select className="form-select" value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>
                <option value="company">شركة</option>
                <option value="individual">فرد / مهندس</option>
              </select>
            </div>
            <div className="form-group"><label className="form-label">ملاحظات</label>
              <input className="form-input" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="اختياري"/>
            </div>
          </div>
          <div className="modal-footer">
            <button className="topbar-btn btn-ghost" onClick={()=>setModal(false)}>إلغاء</button>
            <button className="topbar-btn btn-primary" onClick={checkAndSave} disabled={saving}>{saving?'جاري الحفظ...':'حفظ'}</button>
          </div>
        </div>
      </div>}
      {dupMatches && <PartyDuplicateModal
        matches={dupMatches}
        roleName="كيان"
        onAddRole={addRoleToExisting}
        onCreateNew={()=>{ setDupMatches(null); doCreate(); }}
        onCancel={()=>{ setDupMatches(null); setSaving(false); }}
      />}
    </div>
  );
}

// ── Investor Detail ──
function InvestorDetail({ investorId, onBack }) {
  const [inv, setInv]           = useState(null);
  const [deals, setDeals]       = useState([]);
  const [ledger, setLedger]     = useState([]);
  const [loading, setLoading]   = useState(true);
  const [saving, setSaving]     = useState(false);
  const [tab, setTab]           = useState('overview');

  // Modals
  const [depModal, setDepModal]       = useState(false);
  const [withModal, setWithModal]     = useState(false);
  const [profPayModal, setProfPayModal] = useState(false);
  const [returnModal, setReturnModal] = useState(null); // deal_investor row

  // _nonce is generated once per modal open — stays fixed across retries
  const [depForm,     setDepForm]     = useState({ amount:'', account_id:'', notes:'', _nonce: makeNonce() });
  const [withForm,    setWithForm]    = useState({ amount:'', account_id:'', notes:'', _nonce: makeNonce() });
  const [profPayForm, setProfPayForm] = useState({ amount:'', account_id:'', notes:'', _nonce: makeNonce() });
  const [retForm,     setRetForm]     = useState({ amount:'', notes:'' });

  // ── helper: add ledger entry + update balances ──

  const load = useCallback(async () => {
    const [{ data: i },{ data: di },{ data: lg }] = await Promise.all([
      sb.from('investors').select('*').eq('id', investorId).single(),
      sb.from('deal_investors').select('*, deals(id,deal_number,name,status,value)').eq('investor_id', investorId),
      sb.from('investor_ledger').select('*').eq('investor_id', investorId).order('created_at', { ascending: false }).limit(200),
    ]);
    setInv(i); setDeals(di||[]); setLedger(lg||[]); setLoading(false);
  },[investorId]);
  useEffect(()=>{ load(); },[load]);

  // ── إيداع رصيد ──
  const saveDeposit = async () => {
    if (saving) return;
    try {
      const amt = assertPositiveAmount(depForm.amount, 'مبلغ الإيداع');
      setSaving(true);
      await callRpc('investor_deposit_atomic', {
        p_investor_id:     investorId,
        p_amount:          amt,
        p_account_id:      depForm.account_id || null,
        p_notes:           depForm.notes      || 'إيداع رصيد جديد',
        p_idempotency_key: makeStableKey('deposit', investorId, depForm._nonce),
      });
      setDepModal(false); setDepForm({ amount:'', account_id:'', notes:'', _nonce: makeNonce() });
      await load();
    } catch(err) { showError(err); }
    setSaving(false);
  };

  // ── سحب رأس المال (نقداً) ──
  const saveWithdrawal = async () => {
    if (saving) return;
    try {
      const amt    = assertPositiveAmount(withForm.amount, 'مبلغ السحب');
      const avail  = Number(inv.available_balance || 0);
      if (amt > avail)
        throw new Error(`المبلغ (${amt.toLocaleString('ar-EG')}) أكبر من الرصيد المتاح (${avail.toLocaleString('ar-EG')})`);
      setSaving(true);
      await callRpc('investor_withdrawal_atomic', {
        p_investor_id:     investorId,
        p_amount:          amt,
        p_account_id:      withForm.account_id || null,
        p_notes:           withForm.notes      || 'سحب رأس مال',
        p_idempotency_key: makeStableKey('withdraw', investorId, withForm._nonce),
      });
      setWithModal(false); setWithForm({ amount:'', account_id:'', notes:'', _nonce: makeNonce() });
      await load();
    } catch(err) { showError(err); }
    setSaving(false);
  };

  // ── دفع أرباح ──
  const saveProfitPayment = async () => {
    if (saving) return;
    try {
      const amt    = assertPositiveAmount(profPayForm.amount, 'مبلغ الأرباح');
      const netDue = Number(inv.profit_due||0) - Number(inv.profit_paid||0);
      if (amt > netDue + 0.01)
        throw new Error(`المبلغ (${amt.toLocaleString('ar-EG')}) أكبر من الأرباح المتبقية (${netDue.toLocaleString('ar-EG')})`);
      setSaving(true);
      await callRpc('record_payment_atomic', {
        p_payee_type:      'investor',
        p_payee_id:        investorId,
        p_payment_type:    'profit',
        p_amount:          amt,
        p_account_id:      profPayForm.account_id || null,
        p_deal_id:         null,
        p_notes:           profPayForm.notes || 'دفع أرباح',
        p_idempotency_key: makeStableKey('profit_pay', investorId, profPayForm._nonce),
      });
      setProfPayModal(false); setProfPayForm({ amount:'', account_id:'', notes:'', _nonce: makeNonce() });
      await load();
    } catch(err) { showError(err); }
    setSaving(false);
  };

  // ── إرجاع رأس المال من عملية ──
  const saveCapitalReturn = async () => {
    if (saving) return;
    if (!retForm.amount || !returnModal) return;
    const dealInv   = returnModal;
    const maxReturn = Number(dealInv.amount) - Number(dealInv.principal_returned||0);
    setSaving(true);
    try {
      const amt = assertPositiveAmount(retForm.amount, 'مبلغ الإرجاع');
      if (maxReturn <= 0) throw new Error('تم إرجاع رأس المال بالكامل مسبقاً');
      if (amt > maxReturn + 0.001) throw new Error(`لا يمكن إرجاع أكثر من المتبقي (${maxReturn.toLocaleString('ar-EG')} ج.م)`);
      await callRpc('return_investor_capital', {
        p_investor_id:      investorId,
        p_deal_investor_id: dealInv.id,
        p_deal_id:          dealInv.deals?.id || null,
        p_deal_number:      dealInv.deals?.deal_number || '',
        p_amount:           amt,
        p_notes:            retForm.notes || null,
        p_idempotency_key:  makeStableKey('cap_return', dealInv.id, String(amt)),
      });
      setReturnModal(null); setRetForm({ amount:'', notes:'' });
      await load();
    } catch(err) { showError(err, 'إرجاع رأس المال'); }
    finally { setSaving(false); }
  };

  // ── حجز / تحرير رصيد (Reserved) ──
  const reserveBalance = async (dealInv, action) => {
    try {
      const amt = assertPositiveAmount(dealInv.amount, 'مبلغ الحجز');
      await callRpc('investor_reserve_atomic', {
        p_investor_id:     investorId,
        p_deal_id:         dealInv.deals?.id   || null,
        p_deal_number:     dealInv.deals?.deal_number || '',
        p_amount:          amt,
        p_action:          action, // 'reserve' | 'release'
        p_idempotency_key: makeStableKey('reserve', investorId, dealInv.deals?.id || '', action),
      });
      await load();
    } catch(err) { showError(err); }
  };

  if (loading) return <Loading/>;
  if (!inv) return null;

  const activeDeals    = deals.filter(d=>['funded','executing','delivering','collecting','partial_collected'].includes(d.deals?.status));
  const completedDeals = deals.filter(d=>['fully_collected','closed'].includes(d.deals?.status));
  const studyDeals     = deals.filter(d=>['studying'].includes(d.deals?.status));
  const netProfit      = Number(inv.profit_due||0) - Number(inv.profit_paid||0);
  const totalCapital   = deals.reduce((a,d)=>a+Number(d.amount||0),0);
  const totalReturned  = deals.reduce((a,d)=>a+Number(d.principal_returned||0),0);

  const ledgerTypeMap = {
    deposit:'إيداع', allocation:'تخصيص لعملية', reservation:'حجز',
    reservation_cancel:'إلغاء حجز', capital_return:'إرجاع رأس مال',
    capital_withdrawal:'سحب رأس مال', profit_credit:'ربح مضاف',
    profit_payment:'دفع أرباح',
  };
  const ledgerColors = {
    deposit:'var(--green)', capital_return:'var(--green)', profit_credit:'var(--green)',
    capital_withdrawal:'var(--red)', profit_payment:'var(--red)', allocation:'var(--accent)',
    reservation:'var(--amber)', reservation_cancel:'var(--text2)',
  };
  const ledgerDir = { deposit:'+', capital_return:'+', profit_credit:'+', capital_withdrawal:'-', profit_payment:'-', allocation:'-', reservation:'-', reservation_cancel:'+' };

  return (
    <div className="content">
      {/* P2A-03: Data warning banner — shown when critical queries failed */}
      {hasDataWarning && (
        <div style={{
          background:'rgba(245,158,11,.1)', border:'1px solid rgba(245,158,11,.4)',
          borderRadius:10, padding:'10px 16px', marginBottom:14,
          display:'flex', alignItems:'flex-start', gap:10
        }}>
          <span style={{fontSize:20,lineHeight:1}}>⚠️</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,color:'var(--amber)',marginBottom:3,fontSize:13}}>
              بيانات غير مكتملة — الأرقام المالية قد لا تكون دقيقة
            </div>
            <div style={{fontSize:12,color:'var(--text2)',marginBottom:8}}>{dataWarningMsg}</div>
            <button className="topbar-btn btn-ghost" style={{fontSize:12,padding:'3px 10px'}}
              onClick={()=>{ setLoading(true); load(); }}>
              🔄 إعادة تحميل البيانات
            </button>
          </div>
        </div>
      )}
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16,flexWrap:'wrap'}}>
        <button className="topbar-btn btn-ghost" onClick={onBack}>← رجوع</button>
        <div style={{flex:1}}>
          <div style={{fontSize:18,fontWeight:700,marginBottom:3}}>{inv.name}</div>
          <div style={{fontSize:12,color:'var(--text2)'}}>{inv.phone||''}{inv.email?' · '+inv.email:''}</div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="topbar-btn btn-primary" onClick={()=>setDepModal(true)}>+ إيداع</button>
          {Number(inv.available_balance)>0 && <button className="topbar-btn btn-ghost" onClick={()=>setWithModal(true)}>سحب رأس مال</button>}
          {netProfit>0 && <button className="topbar-btn btn-ghost" style={{color:'var(--green)',borderColor:'var(--green)'}} onClick={()=>setProfPayModal(true)}>دفع أرباح</button>}
        </div>
      </div>

      {/* Stats */}
      <div className="stats-grid" style={{marginBottom:16}}>
        <StatCard label="الرصيد المتاح" valueClass="green" value={fmtShort(inv.available_balance)} sub="جاهز للاستثمار"/>
        <StatCard label="الرصيد المحجوز" valueClass="amber" value={fmtShort(inv.reserved_balance)} sub="تحت الدراسة"/>
        <StatCard label="الرصيد العامل" valueClass="blue" value={fmtShort(inv.working_balance)} sub="في عمليات نشطة"/>
        <div className="stat-card">
          <div className="stat-label">إجمالي رأس المال</div>
          <div className="stat-value">{fmtShort(totalCapital)}</div>
          <div className="stat-sub">مُرجَع: {fmt(totalReturned)}</div>
        </div>
        <div className="stat-card"><div className="stat-label">الأرباح المستحقة</div><div className="stat-value amber">{fmtShort(inv.profit_due)}</div><div className="stat-sub">مدفوع: {fmt(inv.profit_paid)}</div></div>
        <div className="stat-card">
          <div className="stat-label">صافي أرباح متبقية</div>
          <div className={`stat-value ${netProfit>=0?'green':'red'}`}>{fmtShort(netProfit)}</div>
          <div className="stat-sub">لم يُسدَّد بعد</div>
        </div>
      </div>

      {/* Tabs */}
      <div className="section">
        <div className="tabs">
          {[['overview','العمليات'],['ledger','كشف الحساب الكامل']].map(([k,l])=>(
            <button key={k} className={`tab ${tab===k?'active':''}`} onClick={()=>setTab(k)}>{l}</button>
          ))}
        </div>

        {/* العمليات */}
        {tab==='overview' && <div>
          {/* عمليات نشطة */}
          {activeDeals.length>0 && <>
            <div style={{padding:'10px 18px',fontSize:12,fontWeight:600,color:'var(--text2)',background:'var(--bg3)',borderBottom:'1px solid var(--border)'}}>عمليات نشطة — الرصيد العامل</div>
            <table className="table">
              <thead><tr><th>العملية</th><th>المبلغ</th><th>نوع العائد</th><th>ربح مستحق</th><th>رأس مال مُرجَع</th><th>إجراء</th></tr></thead>
              <tbody>{activeDeals.map(d=>(
                <tr key={d.id}>
                  <td><div style={{fontWeight:600}}>{d.deals?.name}</div><div style={{fontSize:11,color:'var(--text2)'}}>{d.deals?.deal_number}</div></td>
                  <td style={{color:'var(--accent)',fontWeight:600}}>{fmt(d.amount)}</td>
                  <td><span className="badge badge-gray">{{profit_percentage:'% ربح',capital_percentage:'% رأسمال',fixed_amount:'ثابت',custom:'خاص'}[d.return_type]||d.return_type}</span></td>
                  <td style={{color:'var(--amber)'}}>{fmt(d.profit_due)}</td>
                  <td style={{color:'var(--green)'}}>{fmt(d.principal_returned)}</td>
                  <td><button className="topbar-btn btn-ghost" style={{fontSize:12,padding:'4px 10px'}} onClick={()=>{ setReturnModal(d); setRetForm({ amount: String(Number(d.amount)-Number(d.principal_returned||0)), notes:'' }); }}>إرجاع رأس مال</button></td>
                </tr>
              ))}</tbody>
            </table>

// ── Investors ──
function Investors({ navigateSub, navigateBack, subId }) {
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(false);
  const [selected, setSelected] = useState(null);
  const [form, setForm] = useState({ name:'', phone:'', email:'', funding_capacity:'' });
  const [errors, setErrors] = useState({});
  const [saving, setSaving] = useState(false);
  const [search, setSearch] = useState('');
  const [dupMatches, setDupMatches] = useState(null);

  const load = useCallback(async () => {
    const { data: d } = await sb.from('investors').select('*').order('created_at').limit(500);
    setData(d||[]); setLoading(false);
  }, []);
  useEffect(()=>{ load(); },[load]);

  const openModal = () => {
    setForm({ name:'', phone:'', email:'', funding_capacity:'' });
    setErrors({}); setDupMatches(null); setModal(true);
  };

  const checkAndSave = async () => {
    if (!form.name.trim()) { setErrors({name:true}); return; }
    if (saving) return;
    setSaving(true);
    try {
      const matches = await searchExistingParty(form.name, form.phone, form.email);
      const newMatches = matches.filter(m => !m.roles?.includes('investor'));
      if (newMatches.length > 0) {
        setDupMatches(newMatches); setSaving(false); return;
      }
      await doCreate();
    } catch(err) { showError(err, 'إضافة ممول'); setSaving(false); }
  };

  const addRoleToExisting = async (party) => {
    setSaving(true);
    try {
      await callRpc('create_investor_atomic', {
        p_name: party.name, p_phone: form.phone||null,
        p_email: form.email||null,
        p_funding_capacity: Number(form.funding_capacity)||0, p_notes: null,
      });
      setModal(false); setDupMatches(null);
      setForm({ name:'', phone:'', email:'', funding_capacity:'' });
      await load();
    } catch(err) { showError(err, 'إضافة دور ممول'); }
    finally { setSaving(false); }
  };

  const doCreate = async () => {
    setSaving(true);
    try {
      await callRpc('create_investor_atomic', {
        p_name: form.name.trim(), p_phone: form.phone||null,
        p_email: form.email||null,
        p_funding_capacity: Number(form.funding_capacity)||0, p_notes: null,
      });
      setModal(false); setDupMatches(null);
      setForm({ name:'', phone:'', email:'', funding_capacity:'' }); setErrors({});
      await load();
    } catch(err) { showError(err, 'إضافة ممول'); }
    finally { setSaving(false); }
  };

  if (subId) return <InvestorDetail investorId={subId} onBack={()=>{ navigateBack('investors'); load(); }}/>;

  // P5: client-side search
  const filteredInv = data.filter(i =>
    !search ||
    (i.name||'').toLowerCase().includes(search.toLowerCase()) ||
    (i.phone||'').toLowerCase().includes(search.toLowerCase())
  );

  return (
    <div className="content">
      <div className="section">
        <div className="section-header">
          <span className="section-title">الممولون ({filteredInv.length})</span>
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            <input className="form-input" style={{width:180,fontSize:13}}
              placeholder="بحث بالاسم أو الهاتف..."
              value={search} onChange={e=>setSearch(e.target.value)}/>
            <button className="topbar-btn btn-primary" onClick={()=>{ setForm({ name:'', phone:'', email:'', funding_capacity:'' }); setErrors({}); setModal(true); }}>
              <Icon d={Icons.plus}/> إضافة ممول
            </button>
          </div>
        </div>
        <div className="section-body">
          {loading ? <Loading/>
          : filteredInv.length === 0
          ? <Empty icon="💰" title={search ? 'لا توجد نتائج' : 'لا يوجد ممولون'}/>
          : <table className="table">
              <thead><tr><th>الاسم</th><th>الهاتف</th><th>القدرة التمويلية</th><th>الرصيد المتاح</th><th>الأرباح المستحقة</th><th>الأرباح المدفوعة</th></tr></thead>
              <tbody>{filteredInv.map(inv=>(
                <tr key={inv.id} onClick={()=>navigateSub('investors',inv.id)} style={{cursor:'pointer'}}>
                  <td><div style={{display:'flex',alignItems:'center',gap:10}}><div className="avatar">{inv.name[0]}</div><span style={{fontWeight:600,color:'var(--accent)'}}>{inv.name}</span></div></td>
                  <td style={{color:'var(--text2)'}}>{inv.phone||'—'}</td>
                  <td>{fmt(inv.funding_capacity)}</td>
                  <td style={{color:'var(--green)'}}>{fmt(inv.available_balance)}</td>
                  <td style={{color:'var(--amber)'}}>{fmt(inv.profit_due)}</td>
                  <td style={{color:'var(--green)'}}>{fmt(inv.profit_paid)}</td>
                </tr>
              ))}</tbody>
            </table>}
        </div>
      </div>

      {modal && <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(false)}>
        <div className="modal">
          <div className="modal-header"><span className="modal-title">إضافة ممول جديد</span><button className="modal-close" onClick={()=>setModal(false)}>✕</button></div>
          <div className="modal-body">
            <div className="form-group">
              <label className="form-label">الاسم <span style={{color:'var(--red)'}}>*</span></label>
              <input className="form-input" style={errors.name?{borderColor:'var(--red)'}:{}} value={form.name} onChange={e=>{setForm({...form,name:e.target.value});setErrors({});}} placeholder="اسم الممول"/>
              {errors.name && <div style={{fontSize:11,color:'var(--red)',marginTop:3}}>هذا الحقل مطلوب</div>}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div className="form-group"><label className="form-label">الهاتف</label>
                <input className="form-input" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder="01xxxxxxxxx"/>
              </div>
              <div className="form-group"><label className="form-label">البريد الإلكتروني</label>
